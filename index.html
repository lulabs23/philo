<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>philosophie / révisions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0:#0a0a0b; --bg-1:#111113; --bg-2:#161618; --bg-3:#1c1c1f; --bg-hover:#202024;
  --border:#26262a; --border-strong:#34343a;
  --text:#ededed; --text-2:#a1a1a8; --text-3:#6c6c75; --text-4:#4a4a52;
  --accent:#4ade80; --accent-dim:rgba(74,222,128,.12); --accent-soft:#2d6e44;
  --error:#f87171;
  --sans:'Geist',-apple-system,system-ui,sans-serif;
  --mono:'Geist Mono','JetBrains Mono',monospace;
  --r:6px; --rs:4px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg-0);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;letter-spacing:-.005em}
body{min-height:100vh;background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(74,222,128,.04),transparent),radial-gradient(ellipse 60% 40% at 100% 0%,rgba(74,222,128,.02),transparent)}
::selection{background:var(--accent-dim);color:var(--text)}

/* TOPBAR */
.topbar{border-bottom:1px solid var(--border);background:rgba(10,10,11,.88);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.topbar-inner{max-width:1280px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:24px;height:24px;border-radius:5px;background:linear-gradient(135deg,var(--accent),var(--accent-soft));display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--bg-0)}
.brand-text{display:flex;flex-direction:column;gap:1px}
.brand-name{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text)}
.brand-sub{font-family:var(--mono);font-size:10px;color:var(--text-3)}
.topbar-meta{display:flex;align-items:center;gap:20px;font-family:var(--mono);font-size:11px;color:var(--text-3)}
.meta-dot{display:inline-block;width:5px;height:5px;background:var(--accent);border-radius:50%;box-shadow:0 0 6px var(--accent);margin-right:6px;animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
main{max-width:1280px;margin:0 auto;padding:28px 24px 80px}

/* NOTIONS */
.cmd-label{font-family:var(--mono);font-size:10px;color:var(--text-4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.cmd-label::before{content:'';width:4px;height:4px;background:var(--text-4);border-radius:50%}
.notion-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:28px}
.notion-chip{padding:5px 11px;background:var(--bg-1);border:1px solid var(--border);color:var(--text-3);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .12s;border-radius:var(--rs);display:inline-flex;align-items:center;gap:6px}
.notion-chip:hover{background:var(--bg-hover);border-color:var(--border-strong);color:var(--text)}
.notion-chip.active{background:var(--text);border-color:var(--text);color:var(--bg-0);font-weight:500}
.notion-chip[data-cours="true"]::before{content:'';width:5px;height:5px;background:var(--accent);border-radius:50%;box-shadow:0 0 5px var(--accent)}
.notion-chip.active[data-cours="true"]::before{background:var(--bg-0);box-shadow:none}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);padding:3px;width:fit-content;margin-bottom:28px}
.tab{background:transparent;border:none;padding:7px 15px;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;color:var(--text-3);border-radius:var(--rs);transition:all .12s;display:flex;align-items:center;gap:7px}
.tab svg{width:13px;height:13px}
.tab:hover{color:var(--text-2)}
.tab.active{background:var(--bg-3);color:var(--text);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}

/* SECTIONS */
.section{display:none;animation:fadeUp .22s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ===================== METHODO ===================== */
.m-toggle{display:flex;gap:4px;margin-bottom:24px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);padding:3px;width:fit-content}
.m-toggle-btn{background:transparent;border:none;padding:7px 14px;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;color:var(--text-3);border-radius:var(--rs);transition:all .12s;display:flex;align-items:center;gap:7px}
.m-toggle-btn svg{width:13px;height:13px}
.m-toggle-btn:hover{color:var(--text-2)}
.m-toggle-btn.active{background:var(--bg-3);color:var(--text)}

.m-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;gap:16px}
.m-title{font-size:15px;font-weight:500;color:var(--text)}
.m-subtitle{font-family:var(--mono);font-size:11px;color:var(--text-4)}

/* Texte cards */
.texte-list{display:flex;flex-direction:column;gap:4px}
.texte-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .12s}
.texte-card:hover,.texte-card.open{border-color:var(--border-strong)}
.texte-card.open{border-color:var(--border-strong);background:var(--bg-1)}
.texte-card-head{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;user-select:none}
.texte-card-left{display:flex;flex-direction:column;gap:2px}
.texte-auteur{font-size:13px;font-weight:500;color:var(--text)}
.texte-oeuvre{font-size:12px;color:var(--text-3);font-style:italic}
.texte-card-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.texte-badge{font-family:var(--mono);font-size:10px;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(74,222,128,.2);padding:2px 7px;border-radius:3px;white-space:nowrap}
.texte-chevron{width:14px;height:14px;color:var(--text-4);transition:transform .2s;flex-shrink:0}
.texte-chevron.open{transform:rotate(90deg)}
.texte-card-body{padding:0 18px 18px;border-top:1px solid var(--border)}
.texte-resume{font-size:13px;color:var(--text-2);line-height:1.55;padding:14px 0 16px;border-bottom:1px solid var(--border);margin-bottom:14px}
.texte-notions{display:flex;flex-direction:column;gap:8px}
.texte-notion-row{display:flex;align-items:flex-start;gap:12px}
.m-notion-pill{font-family:var(--mono);font-size:10px;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(74,222,128,.2);padding:3px 8px;border-radius:3px;white-space:nowrap;cursor:pointer;transition:all .12s;flex-shrink:0;text-decoration:none;display:inline-block}
.m-notion-pill:hover{background:rgba(74,222,128,.18);color:#fff}
.texte-notion-usage{font-size:12.5px;color:var(--text-2);line-height:1.5;padding-top:2px}

/* Notion index (by notion view) */
.notion-index{display:flex;flex-direction:column;gap:4px}
.notion-block{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .12s}
.notion-block.highlighted{border-color:var(--border-strong)}
.notion-block-header{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .12s}
.notion-block-header:hover{background:var(--bg-hover)}
.notion-block-header.active{background:var(--bg-2)}
.notion-block-left{display:flex;align-items:center;gap:10px}
.notion-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;box-shadow:0 0 5px var(--accent);flex-shrink:0}
.notion-block-name{font-size:13px;font-weight:500;color:var(--text)}
.notion-block-count{font-family:var(--mono);font-size:10px;color:var(--text-4)}
.notion-chevron{width:14px;height:14px;color:var(--text-4);flex-shrink:0}
.notion-block-body{border-top:1px solid var(--border)}
.notion-block-empty{display:block;padding:14px 18px;font-size:12px;color:var(--text-4);font-style:italic}
.notion-text-row{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;gap:16px;align-items:flex-start}
.notion-text-row:last-child{border-bottom:none}
.notion-text-meta{display:flex;flex-direction:column;gap:2px;min-width:200px;flex-shrink:0}
.notion-text-auteur{font-size:12px;font-weight:500;color:var(--text)}
.notion-text-oeuvre{font-size:11px;color:var(--text-3);font-style:italic;line-height:1.4}
.notion-text-usage{font-size:12.5px;color:var(--text-2);line-height:1.5}

/* ===================== FLASHCARDS ===================== */
.fc-wrap{max-width:700px;margin:0 auto}
.fc-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-family:var(--mono);font-size:11px;color:var(--text-3)}
.fc-meta-left{display:flex;align-items:center;gap:12px}
.fc-badge{background:var(--bg-1);border:1px solid var(--border);padding:3px 9px;border-radius:var(--rs);color:var(--text-2)}
.fc-bar{width:100px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.fc-bar-fill{height:100%;background:var(--accent);transition:width .3s;box-shadow:0 0 4px var(--accent)}
.flashcard{aspect-ratio:16/10;perspective:1400px;cursor:pointer;margin-bottom:14px}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .48s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);padding:32px 40px;display:flex;flex-direction:column;overflow:auto;transition:border-color .15s}
.flashcard:hover .flashcard-face{border-color:var(--border-strong)}
.flashcard-face.back{transform:rotateY(180deg);background:var(--bg-2)}
.fc-tag-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em}
.fc-tag{color:var(--accent);display:flex;align-items:center;gap:6px}
.fc-tag::before{content:'';width:4px;height:4px;background:var(--accent);border-radius:1px}
.fc-side{color:var(--text-4)}
.fc-question{font-size:21px;font-weight:500;line-height:1.35;color:var(--text);letter-spacing:-.015em;margin-bottom:auto}
.fc-back-q{font-size:12px;color:var(--text-3);line-height:1.4;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.fc-answer{font-size:14.5px;line-height:1.6;color:var(--text);margin-bottom:auto}
.fc-answer strong{font-weight:500;color:var(--accent)}
.fc-answer em{color:var(--text-2)}
.fc-answer ul{list-style:none;margin-top:8px}
.fc-answer li{padding-left:16px;margin-bottom:5px;position:relative}
.fc-answer li::before{content:'';position:absolute;left:0;top:11px;width:7px;height:1px;background:var(--text-4)}
.fc-hint{margin-top:16px;font-family:var(--mono);font-size:10px;color:var(--text-4);display:flex;align-items:center;gap:6px}
.kbd{background:var(--bg-3);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:var(--mono);font-size:10px;color:var(--text-3)}
.fc-controls{display:flex;gap:6px;justify-content:space-between}
.fc-group{display:flex;gap:6px}
.btn{background:var(--bg-1);border:1px solid var(--border);color:var(--text-2);padding:8px 14px;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;border-radius:var(--rs);display:inline-flex;align-items:center;gap:7px}
.btn:hover:not(:disabled){background:var(--bg-hover);border-color:var(--border-strong);color:var(--text)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.primary{background:var(--text);border-color:var(--text);color:var(--bg-0)}
.btn.primary:hover:not(:disabled){background:#ccc;border-color:#ccc}
.btn svg{width:13px;height:13px;flex-shrink:0}

/* ===================== QUIZ ===================== */
.quiz-wrap{max-width:740px;margin:0 auto}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:var(--mono);font-size:11px;color:var(--text-3);gap:12px}
.quiz-bar{flex:1;height:2px;background:var(--border);position:relative}
.quiz-bar-fill{position:absolute;inset-y:0;left:0;background:var(--accent);transition:width .35s}
.quiz-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);padding:30px}
.quiz-question{font-size:18px;font-weight:500;line-height:1.4;color:var(--text);letter-spacing:-.015em;margin-bottom:22px}
.quiz-options{display:flex;flex-direction:column;gap:5px}
.quiz-option{background:var(--bg-2);border:1px solid var(--border);padding:12px 16px;text-align:left;font-family:var(--sans);font-size:13.5px;line-height:1.5;color:var(--text-2);cursor:pointer;transition:all .12s;display:flex;align-items:flex-start;gap:12px;border-radius:var(--rs)}
.quiz-option:hover:not(:disabled){background:var(--bg-3);border-color:var(--border-strong);color:var(--text)}
.quiz-option:disabled{cursor:default}
.q-letter{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text-4);background:var(--bg-1);border:1px solid var(--border);width:20px;height:20px;display:grid;place-items:center;border-radius:3px;flex-shrink:0;margin-top:1px;transition:all .12s}
.quiz-option:hover:not(:disabled) .q-letter{color:var(--text-2)}
.quiz-option.correct{border-color:var(--accent-soft);background:rgba(74,222,128,.07);color:var(--text)}
.quiz-option.correct .q-letter{background:var(--accent);color:var(--bg-0);border-color:var(--accent)}
.quiz-option.wrong{border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.05);color:var(--text)}
.quiz-option.wrong .q-letter{background:var(--error);color:var(--bg-0);border-color:var(--error)}
.quiz-explain{margin-top:18px;padding:14px 16px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--rs);font-size:13px;line-height:1.55;color:var(--text-2);display:none}
.quiz-explain.show{display:block;animation:fadeUp .2s}
.quiz-explain-head{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.quiz-explain-head.ok{color:var(--accent)}
.quiz-explain-head.no{color:var(--error)}
.quiz-explain-head .dot{width:4px;height:4px;border-radius:50%;background:currentColor}
.quiz-actions{display:flex;justify-content:space-between;margin-top:20px;gap:8px}
.quiz-result{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);padding:48px 32px;text-align:center}
.result-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-4);margin-bottom:14px}
.result-score{font-family:var(--mono);font-size:72px;font-weight:500;line-height:1;color:var(--text);letter-spacing:-.04em;margin-bottom:4px}
.result-score .denom{color:var(--text-3);font-size:40px}
.result-pct{font-family:var(--mono);font-size:12px;color:var(--accent);margin-bottom:22px}
.result-msg{font-size:14px;color:var(--text-2);max-width:360px;margin:0 auto 28px;line-height:1.55}
.result-actions{display:flex;gap:8px;justify-content:center}

/* ===================== TABLEAU ===================== */
.table-wrap{max-width:1100px;margin:0 auto}
.table-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;font-family:var(--mono);font-size:11px;color:var(--text-3)}
.table-intro{font-size:13px;color:var(--text-3);margin-bottom:18px;max-width:680px;line-height:1.5}
.data-table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--bg-1)}
.data-table thead{background:var(--bg-2)}
.data-table th{text-align:left;padding:10px 18px;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text-4);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
.data-table td{padding:13px 18px;border-bottom:1px solid var(--border);vertical-align:top}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr{transition:background .1s}
.data-table tbody tr:hover{background:var(--bg-2)}
.p-name{font-size:14px;font-weight:500;color:var(--text)}
.p-dates{font-family:var(--mono);font-size:10px;color:var(--text-4);display:block;margin-top:2px}
.p-concept{font-family:var(--mono);font-size:11px;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(74,222,128,.2);padding:3px 8px;border-radius:3px;display:inline-block;white-space:nowrap}
.p-thesis{font-size:13px;line-height:1.55;color:var(--text-2)}

/* FOOTER */
.footer{max-width:1280px;margin:60px auto 0;padding:18px 24px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--text-4);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}
.legend{display:flex;align-items:center;gap:6px}
.legend-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;box-shadow:0 0 4px var(--accent)}

/* RESPONSIVE */
@media(max-width:768px){
  .topbar-inner{padding:12px 16px}
  .topbar-meta{display:none}
  main{padding:20px 16px 60px}
  .flashcard-face{padding:22px 20px}
  .quiz-card{padding:20px}
  .fc-question{font-size:18px}
  .fc-bar{width:60px}
  .table-wrap{overflow-x:auto}
  .data-table{min-width:580px}
  .data-table td,.data-table th{padding:10px 12px}
  .result-score{font-size:52px}
  .footer{flex-direction:column;gap:8px;padding:16px}
  .texte-notion-row{flex-direction:column;gap:4px}
  .notion-text-meta{min-width:unset}
  .notion-text-row{flex-direction:column;gap:4px}
}
@media(max-width:480px){
  .flashcard{aspect-ratio:4/3}
  .fc-controls{flex-wrap:wrap;gap:8px}
  .fc-group{flex:1}
  .btn{flex:1;justify-content:center;font-size:11px}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">φ</div>
      <div class="brand-text">
        <span class="brand-name">philosophie</span>
        <span class="brand-sub">terminale · bac 2026</span>
      </div>
    </div>
    <div class="topbar-meta">
      <span><span class="meta-dot"></span>18 notions</span>
      <span>27 textes indexés</span>
      <span id="meta-current" style="color:var(--text-2)">—</span>
    </div>
  </div>
</header>

<main>
  <!-- notion bar (masquée sur l'onglet méthodo) -->
  <div id="notionSection">
    <div class="cmd-label">notion active</div>
    <div class="notion-grid" id="notionBar"></div>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="methodo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"/><path d="M14 3h4a2 2 0 0 1 2 2v4"/><path d="M8 12h8"/><path d="M8 8h5"/><path d="M8 16h3"/></svg>
      Méthodo
    </button>
    <button class="tab" data-tab="flashcards">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Cartes
    </button>
    <button class="tab" data-tab="quiz">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M9 9a3 3 0 116 0c0 2-3 3-3 3"/><circle cx="12" cy="17.5" r=".5" fill="currentColor"/></svg>
      QCM
    </button>
    <button class="tab" data-tab="tableau">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      Auteurs
    </button>
  </div>

  <!-- MÉTHODO -->
  <section class="section active" id="section-methodo">
    <div id="methodo-wrap"></div>
  </section>

  <!-- FLASHCARDS -->

    intro: "L'État est l'ensemble des institutions politiques, judiciaires et administratives qui organisent la vie en société. Sa légitimité repose sur quoi ?",
    flashcards: [
      { type: "Définition", q: "Qu'est-ce que l'État ?", a: "Ensemble des <strong>institutions politiques, judiciaires et administratives</strong> organisant la vie en société. Il détient le <strong>monopole de la violence légitime</strong> sur un territoire donné (Weber)." },
      { type: "Auteur", q: "Pourquoi l'humain est-il un animal politique selon Aristote ?", a: "Vivre en cité est inscrit dans <strong>l'essence humaine</strong>. La nature nous a donné le <em>logos</em> (pas seulement la voix) pour penser le juste et l'injuste — faculté proprement politique." },
      { type: "Auteur", q: "Quelles sont les trois communautés selon Aristote ?", a: "<ul><li><strong>Famille</strong> : vivre et survivre</li><li><strong>Village</strong> : bien vivre, confort par la division du travail</li><li><strong>Cité</strong> : agir bien moralement — finalité la plus haute</li></ul>" },
      { type: "Auteur", q: "Qu'est-ce que l'état de nature selon Hobbes ?", a: "Situation pré-politique de <strong>guerre de tous contre tous</strong>. Chacun a droit absolu sur tout. La peur de la mort violente y règne : « l'homme est un loup pour l'homme »." },
      { type: "Auteur", q: "Qu'est-ce que le Léviathan de Hobbes ?", a: "<strong>État autoritaire</strong> issu d'un pacte : les individus transfèrent leur liberté absolue au souverain en échange de la sécurité. Le pouvoir doit être absolu pour être efficace." },
      { type: "Auteur", q: "Que montre Clastres avec « la société contre l'État » ?", a: "Les tribus <strong>pourraient créer un État mais refusent</strong>. Le chef n'a qu'un droit de conseil sans autorité contraignante. Le <strong>rire collectif</strong> neutralise les abus de pouvoir — c'est un choix politique, non une primitive ignorance." },
      { type: "Auteur", q: "Qu'est-ce que la volonté générale chez Rousseau ?", a: "Ce n'est <strong>pas la volonté de la majorité</strong> mais le <strong>bien commun de toute la communauté</strong>. Chacun renonce à son intérêt particulier (aliénation de tous à tous) pour ne penser qu'à l'intérêt général." },
      { type: "Question", q: "Doit-on limiter le pouvoir de l'État ?", a: "<strong>Non</strong> (Hobbes) : seul un pouvoir fort assure la paix. <strong>Oui</strong> (Aristote) : son rôle est limité à la morale. <strong>Oui</strong> (Locke) : le peuple a le droit de résistance si l'État viole ses droits naturels." }
    ],
    quiz: [
      { q: "Pour Aristote, l'humain est un animal politique parce que :", options: ["Il aime voter", "Le logos lui permet de penser le juste et l'injuste", "Il est naturellement violent", "Il vit en groupe"], correct: 1, explain: "Le logos (parole / raison) dépasse la voix animale : il permet de délibérer du bien commun." },
      { q: "L'état de nature selon Hobbes est :", options: ["Un paradis perdu", "Une guerre de tous contre tous", "Une société primitive paisible", "Un ordre divin"], correct: 1, explain: "Sans État, chacun a droit à tout et la mort violente menace en permanence." },
      { q: "La volonté générale chez Rousseau est :", options: ["La volonté de la majorité", "La somme des intérêts particuliers", "Le bien commun de toute la communauté", "L'avis du gouvernement"], correct: 2, explain: "Elle se distingue de la « volonté de tous » : elle vise l'intérêt général sans exclure aucun individu." },
      { q: "Pour Clastres, les sociétés sans État :", options: ["Sont primitives par ignorance", "Refusent l'État par choix politique conscient", "Sont en attente de civilisation", "Ne peuvent fonctionner durablement"], correct: 1, explain: "Elles connaissent le pouvoir mais le refusent : le rire désamorce les abus, le chef n'a qu'un droit de conseil." },
      { q: "Pour Aristote, la communauté politique a pour but :", options: ["Survivre", "Le confort matériel", "Agir bien moralement", "Le commerce"], correct: 2, explain: "Famille : vivre. Village : bien vivre. Cité : agir bien. La finalité politique est la vertu." }
    ],
    philosophes: [
      { nom: "Aristote", dates: "384–322 av. J.-C.", concept: "Animal politique", these: "Vivre en cité est inscrit dans l'essence humaine. Le logos nous destine à délibérer du juste et à viser le bien commun." },
      { nom: "Hobbes", dates: "1588–1679", concept: "Léviathan", these: "L'état de nature est une guerre de tous contre tous. Le Léviathan concentre tous les pouvoirs pour garantir la paix." },
      { nom: "Locke", dates: "1632–1704", concept: "État libéral", these: "L'État protège les droits naturels (vie, liberté, propriété). S'il les viole, le peuple a le droit de résistance." },
      { nom: "Rousseau", dates: "1712–1778", concept: "Volonté générale", these: "La démocratie repose sur l'aliénation de tous à tous : chacun renonce à son intérêt au profit du bien commun." },
      { nom: "Clastres", dates: "1934–1977", concept: "Société contre l'État", these: "Les sociétés sans État refusent activement la centralisation. Le rire désamorce les velléités de pouvoir." },
      { nom: "Weber", dates: "1864–1920", concept: "Monopole de la violence", these: "L'État se définit par le monopole de la violence physique légitime sur un territoire donné." }
    ]
  },
  "inconscient": {
    nom: "L'inconscient", cours: true,
    intro: "L'inconscient est ce qui agit en nous sans que nous en ayons conscience. Il remet en cause la souveraineté du sujet rationnel.",
    flashcards: [
      { type: "Définition", q: "Qu'est-ce que l'inconscient ?", a: "Ensemble des <strong>processus psychiques inaccessibles à la conscience</strong> qui influencent nos pensées, désirs et actions. Concept central de la psychanalyse freudienne." },
      { type: "Auteur", q: "Quelle est la « blessure narcissique » infligée par Freud ?", a: "Après Copernic (Terre ≠ centre du monde) et Darwin (l'homme ≠ création à part), Freud montre que <strong>le moi n'est pas maître dans sa propre maison</strong> — 3e humiliation de l'humanité." },
      { type: "Concept", q: "Quels sont les trois maîtres du moi selon Freud ?", a: "<ul><li><strong>Le ça</strong> : réservoir des pulsions (création, destruction), imprévisible</li><li><strong>Le surmoi</strong> : interdits parentaux intériorisés</li><li><strong>Le principe de réalité</strong> : monde extérieur contraignant</li></ul>Le moi est écartelé entre les trois." },
      { type: "Concept", q: "Qu'est-ce que le « ça » chez Freud ?", a: "Réservoir des <strong>pulsions inconscientes</strong> (création, destruction, libido). Imprévisible, chaotique, impersonnel. On ne culpabilise pas d'avoir des pulsions — seulement des actes." },
      { type: "Concept", q: "Qu'est-ce que le surmoi ?", a: "Intériorisation des <strong>interdits parentaux et sociaux</strong>. À force d'être répétés, ils deviennent automatiques. Ne pas les respecter génère <strong>culpabilité et mauvaise conscience</strong>." },
      { type: "Concept", q: "Différence névrose / psychose chez Freud ?", a: "<strong>Névrose</strong> : tentative <em>consciente</em> d'échapper à un trouble (maniaquerie, superstition). <strong>Psychose</strong> : activité <em>inconsciente</em> (kleptomanie). L'artiste serait un névrosé qui sublime." },
      { type: "Auteur", q: "Que reproche Sartre à l'inconscient freudien ?", a: "Ce serait une <strong>excuse</strong>, une « mauvaise foi » pour fuir la responsabilité. Pour Sartre, je suis toujours libre — invoquer l'inconscient, c'est refuser d'assumer ma liberté." },
      { type: "Question", q: "Sommes-nous maîtres de nous-mêmes ?", a: "<strong>Freud</strong> : non, le moi est écartelé. <strong>Sartre</strong> : oui, l'existence précède l'essence. <strong>Alain</strong> : l'inconscient est un alibi pour ne pas penser." }
    ],
    quiz: [
      { q: "Selon Freud, le moi est écartelé entre :", options: ["Le bien et le mal", "Le corps et l'esprit", "Le ça, le surmoi et le principe de réalité", "Le passé et le futur"], correct: 2, explain: "Trois maîtres tirent le moi dans des directions contraires : pulsions, interdits intériorisés, contraintes du réel." },
      { q: "Le « ça » chez Freud désigne :", options: ["La conscience morale", "L'ensemble des pulsions inconscientes", "Le surmoi parental", "La réalité extérieure"], correct: 1, explain: "Le ça est impersonnel, imprévisible, précède toute pensée volontaire — réservoir brut de l'énergie psychique." },
      { q: "Le surmoi est :", options: ["Un instinct naturel", "L'intériorisation des interdits parentaux et sociaux", "La partie supérieure du cerveau", "Une pulsion sexuelle"], correct: 1, explain: "À force d'entendre les mêmes interdits, ils s'intériorisent et deviennent une voix culpabilisatrice automatique." },
      { q: "La « blessure narcissique » freudienne signifie :", options: ["Que l'homme est cruel", "Que le moi n'est pas maître dans sa propre maison", "Que la conscience est infaillible", "Que la psychanalyse guérit tout"], correct: 1, explain: "3e humiliation après Copernic et Darwin : même intérieurement, l'humain n'est pas le centre rationnel qu'il croit." },
      { q: "Sartre reproche à l'inconscient freudien d'être :", options: ["Trop scientifique", "Une mauvaise foi pour fuir la responsabilité", "Trop poétique", "Inutilement complexe"], correct: 1, explain: "Se cacher derrière l'inconscient, c'est refuser sa liberté absolue et fuir sa responsabilité — mauvaise foi." }
    ],
    philosophes: [
      { nom: "Freud", dates: "1856–1939", concept: "Trois maîtres", these: "Le moi est écartelé entre ça, surmoi et réalité. L'inconscient gouverne en partie nos actes à notre insu." },
      { nom: "Sartre", dates: "1905–1980", concept: "Mauvaise foi", these: "L'inconscient freudien est une excuse pour fuir la liberté. Nous sommes toujours responsables de nos actes." },
      { nom: "Alain", dates: "1868–1951", concept: "Refus de l'inconscient", these: "L'inconscient est un alibi pour ne pas penser. Penser, c'est se rendre compte — l'inconscient dispense d'effort." },
      { nom: "Leibniz", dates: "1646–1716", concept: "Petites perceptions", these: "Avant Freud, Leibniz montre que la conscience claire repose sur une multitude de perceptions inaperçues." },
      { nom: "Lacan", dates: "1901–1981", concept: "Langage de l'inconscient", these: "L'inconscient est structuré comme un langage. Il parle à travers nos lapsus, rêves et symptômes." }
    ]
  },
  "justice": {
    nom: "La justice", cours: false,
    intro: "La justice désigne une vertu individuelle, l'égalité distributive et l'institution judiciaire. Elle interroge le rapport entre droit et morale.",
    flashcards: [
      { type: "Définition", q: "Quels sont les trois sens de la justice ?", a: "<ul><li><strong>Vertu morale</strong> individuelle (être juste)</li><li><strong>Justice sociale</strong> (égalité / équité dans la distribution)</li><li><strong>Institution</strong> judiciaire (tribunaux, lois)</li></ul>" },
      { type: "Distinction", q: "Différence entre légal et légitime ?", a: "<strong>Légal</strong> = conforme à la loi en vigueur. <strong>Légitime</strong> = conforme à la justice morale. Une loi peut être légale sans être légitime (lois de Vichy, apartheid)." },
      { type: "Auteur", q: "Qu'est-ce que la justice distributive selon Aristote ?", a: "Distribuer les biens selon le <strong>mérite</strong> de chacun : égalité <strong>géométrique</strong> (proportionnelle), non arithmétique (à chacun la même chose)." },
      { type: "Auteur", q: "Qu'est-ce que la justice commutative selon Aristote ?", a: "Justice des <strong>échanges</strong> : rétablir l'égalité entre les parties. Si tu m'as volé 100 €, tu me dois 100 €." },
      { type: "Auteur", q: "Que dit Pascal sur la justice ?", a: "« <em>Ne pouvant fortifier la justice, on a justifié la force.</em> » Justice sans force : impuissante. Force sans justice : tyrannique. En pratique, on prend la force pour la justice." },
      { type: "Auteur", q: "Qu'est-ce que le voile d'ignorance de Rawls ?", a: "Expérience de pensée : pour définir une société juste, imaginer qu'on ignore quelle place on y aura. On choisira des principes <strong>équitables pour tous</strong>, notamment les plus défavorisés." },
      { type: "Question", q: "Faut-il obéir à des lois injustes ?", a: "<strong>Socrate</strong> : oui, par respect du contrat social (il accepte de mourir). <strong>Thoreau / King</strong> : non, désobéissance civile. <strong>Antigone</strong> : les lois morales priment sur les lois humaines." }
    ],
    quiz: [
      { q: "La distinction légal / légitime montre :", options: ["Qu'ils sont synonymes", "Qu'une loi peut être légale sans être juste", "Que la légalité prime toujours", "Que la légitimité n'existe pas"], correct: 1, explain: "Les lois de Vichy étaient légales mais non légitimes. La légitimité renvoie à un droit supérieur (moral, naturel)." },
      { q: "La justice distributive d'Aristote consiste à :", options: ["Donner la même chose à tous", "Distribuer selon le mérite (égalité géométrique)", "Tirer au sort", "Privilégier les plus faibles"], correct: 1, explain: "Égalité proportionnelle : chacun reçoit selon sa contribution, non une part arithmétiquement identique." },
      { q: "Le voile d'ignorance de Rawls sert à :", options: ["Masquer la vérité", "Définir des principes de justice en ignorant sa future place", "Critiquer la démocratie", "Justifier les inégalités"], correct: 1, explain: "En ignorant ma place future, je choisis des principes protégeant même les plus défavorisés — par prudence rationnelle." },
      { q: "Pour Pascal, « ne pouvant fortifier la justice » :", options: ["On a aboli la force", "On a justifié la force", "On a fui la justice", "On a oublié la morale"], correct: 1, explain: "Constat lucide et amer : faute de pouvoir rendre la justice puissante, on a prétendu que la force était juste." },
      { q: "L'équité chez Aristote est :", options: ["Un synonyme de l'égalité", "La correction de la loi générale au cas particulier", "Un principe récent", "Le contraire de la justice"], correct: 1, explain: "La loi est générale, les cas sont singuliers : l'équité ajuste pour éviter que la rigueur légale devienne injustice." }
    ],
    philosophes: [
      { nom: "Aristote", dates: "384–322 av. J.-C.", concept: "Justice dist. / commut.", these: "Justice distributive : à chacun selon son mérite. Justice commutative : rétablir l'égalité dans les échanges." },
      { nom: "Pascal", dates: "1623–1662", concept: "Force et justice", these: "« Ne pouvant fortifier la justice, on a justifié la force. » Sans force, la justice est impuissante." },
      { nom: "Hobbes", dates: "1588–1679", concept: "Justice = loi du souverain", these: "Avant l'État, rien n'est juste ni injuste. La loi du Léviathan définit la justice." },
      { nom: "Rousseau", dates: "1712–1778", concept: "Loi = volonté générale", these: "La loi juste exprime la volonté générale et concerne tous également, sans acception de personne." },
      { nom: "Rawls", dates: "1921–2002", concept: "Voile d'ignorance", these: "Une société juste est celle dont on accepterait les principes sans savoir quelle place on y occupera." }
    ]
  },
  "langage": {
    nom: "Le langage", cours: false,
    intro: "Le langage est la capacité de communiquer par des signes. Il est outil de pensée, vecteur de pouvoir, mais aussi source de malentendus.",
    flashcards: [
      { type: "Définition", q: "Qu'est-ce que le langage ?", a: "Système de signes permettant de <strong>communiquer et de penser</strong>. À distinguer : <em>langue</em> (système collectif), <em>parole</em> (acte individuel). Propre à l'humain par sa dimension conceptuelle." },
      { type: "Distinction", q: "Langage humain vs communication animale ?", a: "L'animal a la <strong>voix</strong> (présent, plaisir/douleur). L'humain a le <strong>logos</strong> : il peut parler du passé, du futur, du juste et de l'injuste, de ce qui n'existe pas encore (Aristote)." },
      { type: "Auteur", q: "Que dit Hegel sur pensée et langage ?", a: "« <em>C'est dans les mots que nous pensons.</em> » Le langage ne vêt pas une pensée préexistante — il la <strong>constitue</strong>. Sans langage, pas de pensée véritable." },
      { type: "Auteur", q: "Qu'est-ce que la performativité selon Austin ?", a: "Certains énoncés <strong>font ce qu'ils disent</strong> : « je promets », « je vous déclare mariés ». Ces performatifs sont des actes, pas des descriptions de la réalité." },
      { type: "Concept", q: "Qu'est-ce que l'arbitraire du signe (Saussure) ?", a: "Le lien entre <strong>signifiant</strong> (son) et <strong>signifié</strong> (concept) est <strong>conventionnel, non naturel</strong>. Preuve : les langues différentes ont des mots différents pour les mêmes choses." },
      { type: "Concept", q: "Comment le langage peut-il être un instrument de pouvoir ?", a: "Par la <strong>rhétorique</strong> (manipuler), la <strong>novlangue</strong> d'Orwell (appauvrir le vocabulaire pour empêcher de penser), les « éléments de langage » politiques. Maîtriser le langage, c'est maîtriser les esprits." },
      { type: "Question", q: "Le langage trahit-il la pensée ?", a: "<strong>Bergson</strong> : oui, les mots généraux figent l'expérience singulière. <strong>Gorgias</strong> : on ne peut communiquer un ressenti concret avec des mots abstraits. <strong>Hegel</strong> : non, sans langage, pas de pensée du tout." }
    ],
    quiz: [
      { q: "Ce qui distingue l'humain de l'animal selon Aristote, c'est :", options: ["L'usage d'outils", "Le logos qui permet de penser le juste et l'injuste", "La taille du cerveau", "L'usage du feu"], correct: 1, explain: "L'animal a la voix (présent immédiat), l'humain a le logos — il peut parler de ce qui n'est pas présent, et délibérer du juste." },
      { q: "Selon Hegel, c'est dans les mots que :", options: ["Nous mentons", "Nous pensons", "Nous oublions", "Nous rêvons"], correct: 1, explain: "Le langage n'habille pas une pensée préexistante : il la constitue. Pas de pensée sans mots." },
      { q: "L'arbitraire du signe (Saussure) signifie que :", options: ["Les mots sont inventés au hasard", "Le lien signifiant/signifié est conventionnel, non naturel", "Le langage est inutile", "Toutes les langues sont équivalentes"], correct: 1, explain: "Rien n'oblige naturellement à appeler un cheval « cheval » plutôt que « horse » ou « caballo »." },
      { q: "Un énoncé performatif (Austin) :", options: ["Décrit la réalité", "Fait ce qu'il dit (promettre, marier, baptiser)", "Est toujours faux", "Est purement esthétique"], correct: 1, explain: "« Je promets » ne décrit pas une promesse : il la réalise en la disant. Le langage est aussi action." },
      { q: "Pour Bergson, les mots généraux :", options: ["Expriment parfaitement le vécu", "Figent l'expérience singulière et vivante", "Sont précis et fiables", "Sont universels"], correct: 1, explain: "Le langage est conçu pour l'action sociale, pas pour rendre la nuance de l'expérience personnelle vécue." }
    ],
    philosophes: [
      { nom: "Aristote", dates: "384–322 av. J.-C.", concept: "Logos", these: "Le logos humain dépasse la voix : il porte sur le passé, le futur, le juste. Il fonde la communauté politique." },
      { nom: "Hegel", dates: "1770–1831", concept: "Pensée et langage", these: "« C'est dans les mots que nous pensons. » Le langage n'habille pas la pensée, il la constitue." },
      { nom: "Saussure", dates: "1857–1913", concept: "Arbitraire du signe", these: "Le signe linguistique est arbitraire (signifiant ≠ signifié naturel) et différentiel (sens par différence)." },
      { nom: "Bergson", dates: "1859–1941", concept: "Mots et expérience", these: "Les mots sont généraux et figent l'expérience vécue, toujours singulière. Le langage déforme autant qu'il exprime." },
      { nom: "Austin", dates: "1911–1960", concept: "Performatif", these: "Certains énoncés ne décrivent pas mais font : promettre, baptiser, marier. Le langage est action sur le monde." },
      { nom: "Wittgenstein", dates: "1889–1951", concept: "Jeux de langage", these: "Le sens d'un mot est son usage. Comprendre, c'est savoir jouer le jeu de langage dans une forme de vie donnée." }
    ]
  },
  "liberte": {
    nom: "La liberté", cours: false,
    intro: "La liberté est-elle absence de contrainte, autonomie de la volonté, ou capacité de choisir ? Sommes-nous vraiment libres ?",
    flashcards: [
      { type: "Définition", q: "Quels sont les trois sens de la liberté ?", a: "<ul><li><strong>Liberté physique</strong> : absence de contrainte extérieure</li><li><strong>Libre arbitre</strong> : pouvoir de choisir entre des options</li><li><strong>Autonomie</strong> : se donner à soi-même sa propre loi (vs hétéronomie)</li></ul>" },
      { type: "Distinction", q: "Liberté vs libération ?", a: "<strong>Libération</strong> : suppression d'une contrainte extérieure (l'esclave libéré). <strong>Liberté</strong> : capacité positive d'agir et de se déterminer. Être libéré ne suffit pas à être libre." },
      { type: "Auteur", q: "Que dit Spinoza sur le libre arbitre ?", a: "<strong>Illusion</strong> : nous nous croyons libres parce que nous connaissons nos désirs mais <em>ignorons les causes</em> qui les produisent. Une pierre lancée se croirait libre si elle avait conscience. La vraie liberté = comprendre la nécessité." },
      { type: "Auteur", q: "Qu'est-ce que la liberté selon Sartre ?", a: "<strong>Liberté absolue et angoissante</strong>. Rien ne me prédéfinit, je suis ce que je choisis d'être. La seule chose impossible : <em>ne pas être libre</em>. Ne pas choisir, c'est encore choisir." },
      { type: "Concept", q: "Qu'est-ce que la mauvaise foi (Sartre) ?", a: "<strong>Fuite de la liberté</strong> : se prétendre déterminé (éducation, inconscient, nature) pour se décharger de la responsabilité. Le serveur qui « joue » entièrement son rôle en est l'exemple." },
      { type: "Auteur", q: "Comment Rousseau articule liberté individuelle et civile ?", a: "L'humain naît libre mais est partout dans les fers. Le contrat social transforme la liberté naturelle (anarchique) en <strong>liberté civile</strong> : obéir à la loi qu'on s'est prescrite — véritable liberté." },
      { type: "Question", q: "Le déterminisme exclut-il la liberté ?", a: "<strong>Compatibilisme</strong> (Spinoza, Hegel) : non, être libre c'est comprendre la nécessité. <strong>Incompatibilisme</strong> (Sartre) : nous sommes radicalement libres. <strong>Kant</strong> : phénomène déterminé, noumène libre." }
    ],
    quiz: [
      { q: "Pour Spinoza, le libre arbitre est :", options: ["La plus haute faculté humaine", "Une illusion : nous ignorons les causes de nos désirs", "Un don divin", "Une réalité physique"], correct: 1, explain: "Nous nous croyons libres parce que nous avons conscience de nos désirs mais ignorons les causes qui les déterminent." },
      { q: "Pour Sartre, la seule chose impossible, c'est :", options: ["Être heureux", "Ne pas être libre", "Mentir", "Choisir le mal"], correct: 1, explain: "Ne pas choisir, c'est encore choisir. L'humain est condamné à être libre — la liberté est inéluctable." },
      { q: "L'autonomie kantienne signifie :", options: ["Faire ce qu'on veut", "Se donner à soi-même sa propre loi par la raison", "L'indépendance économique", "L'isolement"], correct: 1, explain: "Auto-nomos : se donner soi-même la loi de la raison, par opposition à l'hétéronomie (loi venue du dehors)." },
      { q: "La mauvaise foi sartrienne consiste à :", options: ["Mentir aux autres", "Se prétendre déterminé pour fuir sa liberté et ses responsabilités", "Être malhonnête en affaires", "Refuser la religion"], correct: 1, explain: "Se cacher derrière son rôle, son inconscient, son passé pour ne pas assumer qu'on est radicalement responsable." },

      { nom: "Descartes", dates: "1596–1650", concept: "Méthode", these: "Quatre règles : évidence, analyse, synthèse, dénombrement. La science prend le modèle mathématique." },

  "technique": {

      { type: "Auteur", q: "Que raconte le mythe de Prométhée ?", a: "Épiméthée distribue les capacités aux animaux mais <strong>oublie l'humain</strong>. Prométhée vole le <strong>feu et la technique</strong>. La technique n'est pas signe de supériorité mais de <strong>dénuement originel</strong>." },
      { type: "Auteur", q: "Quels arts Zeus accorde-t-il pour contrôler la technique ?", a: "<ul><li><strong>Art militaire</strong> : discipline, faire passer les besoins avant les envies</li><li><strong>Art politique</strong> : prendre en compte le bien commun</li></ul>Sans ces arts, la technique se retourne contre l'humain." },

  "temps": {
    nom: "Le temps", cours: false,
    intro: "Le temps est-il une réalité objective, une forme de notre sensibilité, ou la conscience même ? Comment l'humain habite-t-il sa durée ?",
    flashcards: [
      { type: "Définition", q: "Qu'est-ce que le temps ?", a: "Forme du devenir : succession ordonnée des moments (passé, présent, futur). Mais le passé n'est plus, le futur n'est pas encore, le présent passe — Saint Augustin : « Si on ne me le demande pas, je le sais ; si on me le demande, je ne le sais plus. »" },
      { type: "Distinction", q: "Temps physique vs temps vécu ?", a: "<strong>Temps physique</strong> : objectif, mesurable, homogène. <strong>Temps vécu</strong> (Bergson : <em>durée</em>) : subjectif, qualitatif — une heure d'attente n'est pas une heure de plaisir." },
      { type: "Auteur", q: "Que dit Saint Augustin du temps ?", a: "Le temps est dans <strong>l'âme</strong>. Trois présents : <strong>présent du passé</strong> (mémoire), <strong>présent du présent</strong> (attention), <strong>présent du futur</strong> (attente). Tout se vit au présent." },
      { type: "Auteur", q: "Qu'est-ce que la durée bergsonienne ?", a: "<strong>Temps vécu, qualitatif</strong>, irréductible à la mesure. Les états de conscience se fondent les uns dans les autres comme une mélodie. Le temps spatialisé des sciences trahit la durée vraie." },
      { type: "Auteur", q: "Que dit Kant sur le temps ?", a: "Le temps est une <strong>forme a priori de la sensibilité</strong> : non une chose dans le monde, mais la manière dont notre esprit ordonne les phénomènes. Tout ce qu'on perçoit est nécessairement temporel." },
      { type: "Auteur", q: "Que dit Heidegger sur l'être-pour-la-mort ?", a: "L'humain est un <strong>être temporel par essence</strong>. La <strong>finitude</strong> (savoir qu'on va mourir) donne sens à l'existence et oblige à l'authenticité — vivre sa vie comme la sienne." },
      { type: "Question", q: "Peut-on être maître du temps ?", a: "<strong>Stoïciens</strong> : le présent seul nous appartient. <strong>Pascal</strong> : nous fuyons le présent dans le passé/futur (« nous ne vivons jamais »). <strong>Bergson</strong> : la durée vraie est création, liberté en acte." }
    ],
    quiz: [
      { q: "Pour Saint Augustin, le temps existe :", options: ["Dans la nature seule", "Dans l'âme (mémoire, attention, attente)", "Hors de toute conscience", "Uniquement chez Dieu"], correct: 1, explain: "Trois temps présents : présent du passé (mémoire), présent du présent (attention), présent du futur (attente)." },
      { q: "La durée bergsonienne désigne :", options: ["Le temps des horloges", "Le temps vécu, qualitatif, irréductible à la mesure", "L'éternité", "Le passé seul"], correct: 1, explain: "Bergson distingue le temps spatialisé (homogène) de la durée vraie (qualitative, hétérogène, vécue)." },
      { q: "Pour Kant, le temps est :", options: ["Une chose réelle dans le monde", "Une forme a priori de la sensibilité", "Une illusion", "Un concept religieux"], correct: 1, explain: "Non une propriété des choses, mais la forme que notre esprit impose à toute expérience possible." },
      { q: "L'être-pour-la-mort de Heidegger signifie :", options: ["Que la vie est désespérée", "Que la finitude donne sens à l'existence et appelle l'authenticité", "Qu'il faut craindre la mort", "Que la mort n'existe pas"], correct: 1, explain: "Savoir qu'on mourra transforme radicalement le rapport à la vie : on ne peut plus la vivre comme infinie." },
      { q: "Le carpe diem épicurien recommande :", options: ["De préparer l'au-delà", "De profiter du présent, seul réel", "De vivre dans le passé", "D'anticiper l'avenir"], correct: 1, explain: "Seul le présent est à notre portée : le passé est révolu, le futur incertain. Cueille le jour." }
    ],
    philosophes: [

      { nom: "Kant", dates: "1724–1804", concept: "Forme a priori", these: "Le temps n'est pas dans les choses mais dans notre sensibilité. Il conditionne toute expérience possible." },
      { nom: "Hegel", dates: "1770–1831", concept: "Histoire", these: "Le temps est le devenir de l'Esprit. L'histoire a un sens : la marche progressive de la liberté à travers les époques." },

      { nom: "Pascal", dates: "1623–1662", concept: "Fuite du présent", these: "Nous ne vivons jamais : toujours dans le passé ou le futur, jamais dans le présent. Le divertissement nous fuit." }
    ]
  },

  "verite": {

      { type: "Définition", q: "Qu'est-ce que la vérité ?", a: "<strong>Adéquation entre l'intellect et la chose</strong> (<em>adæquatio rei et intellectus</em>). Une phrase est vraie si elle décrit fidèlement la réalité. Du grec <em>aletheia</em> = dévoilement." },
      { type: "Distinction", q: "Vérité vs réalité ?", a: "La <strong>réalité</strong> est ce qui est. La <strong>vérité</strong> est une propriété d'un <em>discours</em> qui décrit fidèlement la réalité. La réalité est ; la vérité se dit." },
      { type: "Auteur", q: "Qu'est-ce que le pragmatisme de William James ?", a: "Le vrai n'est pas ce qui est logique, mais ce qui <strong>rend l'action plus efficace</strong>. La vérité a une <strong>valeur d'usage</strong> : on la cherche pour mieux agir, non par amour du vrai en soi." },
      { type: "Auteur", q: "Pourquoi Kant interdit-il absolument le mensonge ?", a: "<ul><li>Je ne peux <strong>pas prévoir les conséquences</strong> d'un mensonge</li><li>Le mensonge <strong>détruit la confiance sociale</strong> nécessaire à la vie commune</li></ul>Même au meurtrier qui cherche mon ami, je dois dire la vérité." },
      { type: "Auteur", q: "Que représente l'allégorie de la caverne de Platon ?", a: "<ul><li><strong>Ombres</strong> = illusions quotidiennes</li><li><strong>Prisonniers</strong> = nous, trompés par perceptions et préjugés</li><li><strong>Sortie vers la lumière</strong> = accès aux Idées universelles</li><li><strong>Retour</strong> = risque d'être rejeté ou tué en disant la vérité</li></ul>" },
      { type: "Concept", q: "Qu'est-ce que le relativisme (Protagoras) ?", a: "« <strong>L'homme est mesure de toutes choses</strong> » : la vérité dépend de ma perception. Elle est personnelle, variable et incommunicable — on ne peut décrire le rouge à un aveugle." },
      { type: "Auteur", q: "Qu'est-ce que le perspectivisme de Nietzsche ?", a: "La vérité est multiple, dépend du <strong>point de vue</strong>. Tous les points de vue ne se valent pas : <strong>l'expert a plus de légitimité</strong>. Différent de l'opinion : le point de vue est un angle d'analyse, pas juste un ressenti." },
      { type: "Distinction", q: "Opinion vs point de vue (Nietzsche) ?", a: "<strong>Opinion</strong> : repose sur le vécu — toutes se valent. <strong>Point de vue</strong> : angle d'analyse adopté pour examiner un objet. L'expert (cinématographe, historien) a un point de vue plus légitime qu'un non-spécialiste." },
      { type: "Question", q: "Rechercher la vérité est-il toujours utile ?", a: "<strong>Oui</strong> (James) : elle augmente l'efficacité de l'action. <strong>Oui</strong> (Kant) : sans elle, la confiance sociale s'effondre. <strong>Risqué</strong> (Platon) : dire la vérité expose au rejet et au danger." }
    ],
    quiz: [

      { q: "Pour William James, la vérité :", options: ["Est rationnelle et désintéressée", "A de la valeur si elle rend l'action plus efficace", "Existe en soi indépendamment de l'usage", "N'existe pas"], correct: 1, explain: "Pragmatisme : le vrai est ce qui marche, ce qui augmente l'efficacité — non ce qui est logique en soi." },
      { q: "Pour Kant, mentir est :", options: ["Permis pour sauver une vie", "Toujours interdit, même au meurtrier", "Variable selon le contexte", "Moralement neutre"], correct: 1, explain: "Je ne peux prévoir les conséquences et tout mensonge ruine la confiance sociale. Le devoir de vérité est inconditionnel." },
      { q: "Dans l'allégorie de la caverne, les ombres représentent :", options: ["La vérité ultime", "Les illusions quotidiennes auxquelles nous croyons", "Les Idées", "Les philosophes"], correct: 1, explain: "Les prisonniers prennent les ombres pour la réalité — nous prenons nos préjugés et perceptions pour des vérités." },
      { q: "Pour Protagoras, l'homme est mesure de toutes choses signifie :", options: ["L'homme est sage", "La vérité dépend de la perception de chacun (relativisme)", "L'homme domine la nature", "Tous les hommes pensent pareil"], correct: 1, explain: "Relativisme : la vérité est personnelle, variable — ce qui est vrai pour moi ne l'est pas nécessairement pour toi." },

    ],
    philosophes: [

      { notion: "liberte",   usage: "Pour Socrate, être libre c'est se libérer de ses désirs. Pour Calliclès : n'avoir aucune retenue." },
      { notion: "raison",    usage: "Pour Socrate, le bonheur est rationnel car il suppose de se contenter de ce qu'on a." }
    ]
  },
  {
    id: "alain_bonheur",
    auteur: "Alain",
    oeuvre: "Propos sur le bonheur",
    resume: "Le bonheur n'est pas reçu, il se construit. L'enfant joue pleinement, sans calcul : c'est le modèle du bonheur — implication totale dans l'instant, sans conscience réfléchie.",
    notions: [
      { notion: "bonheur",   usage: "Le bonheur se construit — et doit être partagé pour inciter les autres à en faire de même." },
      { notion: "art",       usage: "L'art permet une implication et une immersion totale — première condition du bonheur." },
      { notion: "devoir",    usage: "L'homme a le devoir de construire son bonheur et d'inciter autrui à en faire de même." },
      { notion: "travail",   usage: "Chez l'enfant, travail et jeu ne s'opposent pas : il s'implique pleinement dans ce qu'il fait." },
      { notion: "conscience",usage: "Pour connaître le bonheur, la conscience ne doit pas être pleine : le bonheur suppose l'oubli de soi." },
      { notion: "liberte",   usage: "Le bonheur suppose la liberté : l'enfant joue quand il le souhaite." },
      { notion: "temps",     usage: "L'enfant s'implique pleinement dans l'instant présent et oublie le passé et le futur." }
    ]
  },
  {
    id: "nietzsche_retour",
    auteur: "Nietzsche",
    oeuvre: "Le gai savoir §341 — L'éternel retour",
    resume: "Si tu devais revivre ta vie telle qu'elle a été, infiniment, voudrais-tu que rien ne change ? Test existentiel radical de ce qu'on désire vraiment.",
    notions: [
      { notion: "liberte",   usage: "L'éternel retour permet de savoir ce qu'on désire vraiment — et de se libérer de toute influence extérieure." },
      { notion: "devoir",    usage: "Cet argument permet de déterminer les actions qu'on se doit d'accomplir." },
      { notion: "conscience",usage: "L'éternel retour est un argument pour déterminer l'individu qu'on veut devenir." },
      { notion: "temps",     usage: "L'éternel retour permet de faire le point sur l'existence passée et d'envisager l'existence à venir." }
    ]
  },
  {
    id: "machiavel_prince",
    auteur: "Machiavel",
    oeuvre: "Le Prince — Réputation, libéralité, cruauté, amour/crainte, adaptation",
    resume: "Le prince doit séparer politique et morale. Il doit savoir ne pas être bon, s'adapter à la situation, se faire craindre plutôt qu'aimer, et conserver sa réputation coûte que coûte.",
    notions: [
      { notion: "politique", usage: "Le politique est le règne de l'apparence : l'important n'est pas d'être juste, mais de le paraître." },
      { notion: "etat",      usage: "Pour conserver le pouvoir, seules comptent la réputation et l'adaptation à la situation." },
      { notion: "devoir",    usage: "Le seul devoir du prince est de conserver le pouvoir — par la ruse, la cruauté ou la générosité selon les cas." },
      { notion: "justice",   usage: "Pour un prince, l'important n'est pas d'incarner la justice, mais de paraître juste." },
      { notion: "verite",    usage: "La vérité n'est pas centrale en politique : c'est le règne de l'apparence et de la réputation." },
      { notion: "liberte",   usage: "La cruauté du dirigeant contraint la liberté du peuple, mais le protège en évitant l'anarchie." },
      { notion: "raison",    usage: "Le dirigeant est un être de raison : il agit selon la situation, non selon ses valeurs ou sentiments." },
      { notion: "temps",     usage: "Lorsque la relation implique un rapport hiérarchique, l'amour ne dure pas — seule la crainte est stable." },
      { notion: "conscience",usage: "Le dirigeant doit être conscient de la situation pour s'y adapter avec précision." }
    ]
  }
];

</script>
<script>
// === APP LOGIC ===

const state = {
  currentTab: 'methodo',
  currentNotion: 'verite',
  currentTexte: null,
  methodoView: 'textes', // 'textes' | 'notions'
  fcIndex: 0,
  fcOrder: [],
  quizIndex: 0,
  quizAnswers: [],
  quizFinished: false
};

function $(s) { return document.querySelector(s); }
function $$(s) { return document.querySelectorAll(s); }
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

// Nom affiché d'une notion
function notionLabel(key) {
  return PHILO_DATA[key] ? PHILO_DATA[key].nom : key;
}

// === NOTION BAR ===
function buildNotionBar() {
  const bar = $('#notionBar');
  if (!bar) return;
  bar.innerHTML = '';
  NOTIONS_ORDER.forEach(key => {
    const d = PHILO_DATA[key];
    const btn = document.createElement('button');
    btn.className = 'notion-chip' + (key === state.currentNotion ? ' active' : '');
    btn.textContent = d.nom;
    btn.dataset.key = key;
    if (d.cours) btn.dataset.cours = 'true';
    btn.addEventListener('click', () => {
      state.currentNotion = key;
      state.fcIndex = 0; state.fcOrder = [];
      state.quizIndex = 0; state.quizAnswers = []; state.quizFinished = false;
      buildNotionBar();
      updateMetaCurrent();
      renderAll();
    });
    bar.appendChild(btn);
  });
}

function updateMetaCurrent() {
  const el = $('#meta-current');
  if (el) el.textContent = PHILO_DATA[state.currentNotion]?.nom || '—';
}

// === TABS ===
function setupTabs() {
  $$('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.currentTab = tab.dataset.tab;
      $$('.tab').forEach(t => t.classList.toggle('active', t === tab));
      $$('.section').forEach(s => s.classList.toggle('active', s.id === `section-${state.currentTab}`));
      // notion bar : visible sauf sur methodo
      const nb = $('#notionSection');
      if (nb) nb.style.display = state.currentTab === 'methodo' ? 'none' : '';
      if (state.currentTab === 'methodo') renderMethodo();
    });
  });
}

// =============================================
// === SECTION MÉTHODO ========================
// =============================================

function renderMethodo() {
  const wrap = $('#methodo-wrap');
  if (!wrap) return;

  const toggleBar = `
    <div class="m-toggle">
      <button class="m-toggle-btn ${state.methodoView === 'textes' ? 'active' : ''}" data-view="textes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Par texte
      </button>
      <button class="m-toggle-btn ${state.methodoView === 'notions' ? 'active' : ''}" data-view="notions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
        Par notion
      </button>
    </div>`;

  if (state.methodoView === 'textes') {
    wrap.innerHTML = toggleBar + renderMethodoTextes();
  } else {
    wrap.innerHTML = toggleBar + renderMethodoNotions();
  }

  // toggle listeners
  wrap.querySelectorAll('.m-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.methodoView = btn.dataset.view;
      state.currentTexte = null;
      renderMethodo();
    });
  });

  // texte click
  wrap.querySelectorAll('.texte-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      state.currentTexte = state.currentTexte === id ? null : id;
      renderMethodo();
    });
  });

  // notion pill click → switch to notions view filtered
  wrap.querySelectorAll('.m-notion-pill[data-goto]').forEach(pill => {
    pill.addEventListener('click', e => {
      e.stopPropagation();
      state.methodoView = 'notions';
      state.currentNotion = pill.dataset.goto;
      state.currentTexte = null;
      renderMethodo();
    });
  });

  // notion header click (notions view)
  wrap.querySelectorAll('.notion-block-header').forEach(h => {
    h.addEventListener('click', () => {
      const key = h.dataset.notion;
      const body = h.nextElementSibling;
      const isOpen = body.style.display !== 'none';
      body.style.display = isOpen ? 'none' : '';
      h.querySelector('.notion-chevron').style.transform = isOpen ? '' : 'rotate(90deg)';
    });
  });
}

function renderMethodoTextes() {
  let html = `<div class="m-header">
    <span class="m-title">Connexions inter-notions</span>
    <span class="m-subtitle">${METHODO.length} textes · cliquer pour développer</span>
  </div>
  <div class="texte-list">`;

  METHODO.forEach(t => {
    const isOpen = state.currentTexte === t.id;
    const notionCount = t.notions.length;
    html += `
    <div class="texte-card ${isOpen ? 'open' : ''}" data-id="${t.id}">
      <div class="texte-card-head">
        <div class="texte-card-left">
          <span class="texte-auteur">${t.auteur}</span>
          <span class="texte-oeuvre">${t.oeuvre}</span>
        </div>
        <div class="texte-card-right">
          <span class="texte-badge">${notionCount} notion${notionCount > 1 ? 's' : ''}</span>
          <svg class="texte-chevron ${isOpen ? 'open' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>`;

    if (isOpen) {
      html += `<div class="texte-card-body">
        <p class="texte-resume">${t.resume}</p>
        <div class="texte-notions">`;
      t.notions.forEach(n => {
        html += `
          <div class="texte-notion-row">
            <span class="m-notion-pill" data-goto="${n.notion}">${notionLabel(n.notion)}</span>
            <span class="texte-notion-usage">${n.usage}</span>
          </div>`;
      });
      html += `</div></div>`;
    }
    html += `</div>`;
  });

  html += `</div>`;
  return html;
}

function renderMethodoNotions() {
  // group usages by notion
  const byNotion = {};
  NOTIONS_ORDER.forEach(k => { byNotion[k] = []; });

  METHODO.forEach(t => {
    t.notions.forEach(n => {
      if (byNotion[n.notion] !== undefined) {
        byNotion[n.notion].push({ auteur: t.auteur, oeuvre: t.oeuvre, id: t.id, usage: n.usage });
      }
    });
  });

  let html = `<div class="m-header">
    <span class="m-title">Index par notion</span>
    <span class="m-subtitle">Tous les textes mobilisables par thème</span>
  </div>
  <div class="notion-index">`;

  NOTIONS_ORDER.forEach(key => {
    const items = byNotion[key];
    const d = PHILO_DATA[key];
    const isActive = key === state.currentNotion;
    html += `
    <div class="notion-block ${isActive ? 'highlighted' : ''}">
      <div class="notion-block-header ${isActive ? 'active' : ''}" data-notion="${key}">
        <div class="notion-block-left">
          ${d.cours ? '<span class="notion-dot"></span>' : ''}
          <span class="notion-block-name">${d.nom}</span>
          <span class="notion-block-count">${items.length} texte${items.length > 1 ? 's' : ''}</span>
        </div>
        <svg class="notion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform .2s"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="notion-block-body" style="${isActive ? '' : 'display:none'}">`;

    if (items.length === 0) {
      html += `<span class="notion-block-empty">Aucun texte indexé pour cette notion.</span>`;
    } else {
      items.forEach(item => {
        html += `
        <div class="notion-text-row">
          <div class="notion-text-meta">
            <span class="notion-text-auteur">${item.auteur}</span>
            <span class="notion-text-oeuvre">${item.oeuvre}</span>
          </div>
          <div class="notion-text-usage">${item.usage}</div>
        </div>`;
      });
    }
    html += `</div></div>`;
  });

  html += `</div>`;
  return html;
}

// =============================================
// === FLASHCARDS ==============================
// =============================================
function renderFlashcards() {
  const data = PHILO_DATA[state.currentNotion];
  const cards = data.flashcards;
  const total = cards.length;

  if (!state.fcOrder.length || state.fcOrder.length !== total) {
    state.fcOrder = cards.map((_, i) => i);
  }

  $('#fc-counter').textContent = `${state.fcIndex + 1} / ${total}`;
  $('#fc-notion-name').textContent = data.nom;
  $('#fc-bar-fill').style.width = `${((state.fcIndex + 1) / total) * 100}%`;

  const card = cards[state.fcOrder[state.fcIndex]];
  $('#fc-front-tag').textContent = card.type;
  $('#fc-back-tag').textContent = card.type;
  $('#fc-front-q').innerHTML = card.q;
  $('#fc-back-q').innerHTML = card.q;
  $('#fc-back-a').innerHTML = card.a;
  $('#flashcard').classList.remove('flipped');
  $('#fc-prev').disabled = state.fcIndex === 0;
  $('#fc-next').disabled = state.fcIndex === total - 1;
}

function setupFlashcards() {
  $('#flashcard').addEventListener('click', () => $('#flashcard').classList.toggle('flipped'));
  $('#fc-flip').addEventListener('click', e => { e.stopPropagation(); $('#flashcard').classList.toggle('flipped'); });
  $('#fc-prev').addEventListener('click', e => { e.stopPropagation(); if (state.fcIndex > 0) { state.fcIndex--; renderFlashcards(); } });
  $('#fc-next').addEventListener('click', e => {
    e.stopPropagation();
    if (state.fcIndex < PHILO_DATA[state.currentNotion].flashcards.length - 1) { state.fcIndex++; renderFlashcards(); }
  });
  $('#fc-shuffle').addEventListener('click', e => {
    e.stopPropagation();
    state.fcOrder = shuffle(Array.from({ length: PHILO_DATA[state.currentNotion].flashcards.length }, (_, i) => i));
    state.fcIndex = 0;
    renderFlashcards();
  });
  document.addEventListener('keydown', e => {
    if (state.currentTab !== 'flashcards') return;
    if (['INPUT','TEXTAREA','BUTTON'].includes(e.target.tagName)) return;
    if (e.key === 'ArrowLeft' && state.fcIndex > 0) { state.fcIndex--; renderFlashcards(); }
    else if (e.key === 'ArrowRight' && state.fcIndex < PHILO_DATA[state.currentNotion].flashcards.length - 1) { state.fcIndex++; renderFlashcards(); }
    else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); $('#flashcard').classList.toggle('flipped'); }
  });
}

// =============================================
// === QUIZ ====================================
// =============================================
function renderQuiz() {
  const data = PHILO_DATA[state.currentNotion];
  const qs = data.quiz;
  const wrap = $('#quiz-wrap');
  $('#quiz-counter').textContent = `${data.nom} · ${qs.length} questions`;

  if (state.quizFinished) { renderQuizResult(); return; }

  const qi = state.quizIndex;
  const q = qs[qi];
  const answered = state.quizAnswers.find(a => a.qIndex === qi);

  wrap.innerHTML = `
    <div class="quiz-meta">
      <span>${String(qi + 1).padStart(2,'0')}</span>
      <div class="quiz-bar"><div class="quiz-bar-fill" style="width:${((qi + 1) / qs.length) * 100}%"></div></div>
      <span>${String(qs.length).padStart(2,'0')}</span>
    </div>
    <div class="quiz-card">
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-options" id="quiz-opts"></div>
      <div class="quiz-explain ${answered ? 'show' : ''}" id="quiz-expl">
        <div class="quiz-explain-head ${answered?.correct ? 'ok' : 'no'}">
          <span class="dot"></span>${answered?.correct ? 'Bonne réponse' : 'Réponse incorrecte'}
        </div>
        ${q.explain}
      </div>
      <div class="quiz-actions">
        <button class="btn" id="q-prev" ${qi === 0 ? 'disabled' : ''}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Préc.
        </button>
        <button class="btn primary" id="q-next">
          ${qi === qs.length - 1 ? 'Voir score' : 'Suivant'}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>`;

  const opts = $('#quiz-opts');
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.disabled = !!answered;
    const letter = String.fromCharCode(65 + i);
    btn.innerHTML = `<span class="q-letter">${letter}</span><span>${opt}</span>`;
    if (answered) {
      if (i === q.correct) btn.classList.add('correct');
      else if (i === answered.chosen) btn.classList.add('wrong');
    }
    btn.addEventListener('click', () => {
      if (state.quizAnswers.find(a => a.qIndex === qi)) return;
      state.quizAnswers.push({ qIndex: qi, chosen: i, correct: i === q.correct });
      renderQuiz();
    });
    opts.appendChild(btn);
  });

  $('#q-prev').addEventListener('click', () => { state.quizIndex--; renderQuiz(); });
  $('#q-next').addEventListener('click', () => {
    if (state.quizIndex < qs.length - 1) { state.quizIndex++; renderQuiz(); }
    else { state.quizFinished = true; renderQuiz(); }
  });
}

function renderQuizResult() {
  const data = PHILO_DATA[state.currentNotion];
  const total = data.quiz.length;
  const correct = state.quizAnswers.filter(a => a.correct).length;
  const pct = Math.round((correct / total) * 100);
  const msgs = [
    [80, "Maîtrise solide. Quelques détails à affiner."],
    [60, "Bon socle. Retravaille les points manqués."],
    [40, "Les bases sont là. Revois les flashcards."],
    [0,  "Continue. Relis le cours et recommence."]
  ];
  const msg = (pct === 100 ? "Parfait. Notion maîtrisée." : msgs.find(([t]) => pct >= t)[1]);

  $('#quiz-wrap').innerHTML = `
    <div class="quiz-result">
      <div class="result-label">résultat · ${data.nom}</div>
      <div class="result-score">${correct}<span class="denom"> / ${total}</span></div>
      <div class="result-pct">${pct}%</div>
      <div class="result-msg">${msg}</div>
      <div class="result-actions">
        <button class="btn" id="qr-review">Revoir</button>
        <button class="btn primary" id="qr-restart">↻ Recommencer</button>
      </div>
    </div>`;

  $('#qr-review').addEventListener('click', () => { state.quizFinished = false; state.quizIndex = 0; renderQuiz(); });
  $('#qr-restart').addEventListener('click', () => { state.quizFinished = false; state.quizIndex = 0; state.quizAnswers = []; renderQuiz(); });
}

// =============================================
// === TABLEAU =================================
// =============================================
function renderTable() {
  const data = PHILO_DATA[state.currentNotion];
  const philos = data.philosophes;
  $('#tab-notion-name').textContent = data.nom;
  $('#tab-counter').textContent = `${philos.length} philosophe${philos.length > 1 ? 's' : ''}`;
  $('#tab-intro').textContent = data.intro;
  const body = $('#tab-body');
  body.innerHTML = '';
  philos.forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><div class="p-name">${p.nom}<span class="p-dates">${p.dates}</span></div></td>
      <td><span class="p-concept">${p.concept}</span></td>
      <td><div class="p-thesis">${p.these}</div></td>`;
    body.appendChild(tr);
  });
}

// =============================================
// === RENDER ALL ==============================
// =============================================
function renderAll() {
  if (state.currentTab === 'methodo') { renderMethodo(); return; }
  renderFlashcards();
  renderQuiz();
  renderTable();
}

// =============================================
// === INIT ====================================
// =============================================
document.addEventListener('DOMContentLoaded', () => {
  buildNotionBar();
  updateMetaCurrent();
  setupTabs();
  setupFlashcards();
  renderMethodo();
});

</script>
</body>
</html>

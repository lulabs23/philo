<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>φ flashcards · textes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0a0a0b;
  --bg1:    #111113;
  --bg2:    #161618;
  --bg3:    #1c1c1f;
  --bgh:    #202024;
  --bd:     #26262a;
  --bds:    #34343a;
  --tx:     #ededed;
  --tx2:    #a1a1a8;
  --tx3:    #6c6c75;
  --tx4:    #4a4a52;
  --ac:     #4ade80;
  --acd:    rgba(74,222,128,.1);
  --er:     #f87171;
  --sans:   'Geist', -apple-system, sans-serif;
  --mono:   'Geist Mono', monospace;
  --r:      7px;
  --rs:     4px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--tx);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  letter-spacing: -.005em;
}
body {
  background-image:
    radial-gradient(ellipse 70% 40% at 50% -10%, rgba(74,222,128,.05), transparent),
    radial-gradient(ellipse 50% 30% at 90% 5%, rgba(74,222,128,.02), transparent);
}
::selection { background: var(--acd); color: var(--tx); }

/* ── TOPBAR ── */
.topbar {
  border-bottom: 1px solid var(--bd);
  background: rgba(10,10,11,.88);
  backdrop-filter: blur(12px);
  position: sticky; top:0; z-index:100;
}
.topbar-inner {
  max-width: 900px; margin: 0 auto;
  padding: 13px 24px;
  display: flex; align-items: center; justify-content: space-between; gap:16px;
}
.brand { display: flex; align-items: center; gap:10px; }
.brand-mark {
  width:24px; height:24px; border-radius:5px;
  background: linear-gradient(135deg, var(--ac), #2d6e44);
  display:grid; place-items:center;
  font-family:var(--mono); font-size:12px; font-weight:600; color:#0a0a0b;
}
.brand-name { font-family:var(--mono); font-size:13px; font-weight:500; }
.brand-sub  { font-family:var(--mono); font-size:10px; color:var(--tx3); }
.brand-text { display:flex; flex-direction:column; gap:1px; }
.topbar-right {
  font-family:var(--mono); font-size:11px; color:var(--tx4);
  display:flex; align-items:center; gap:16px;
}
.dot-live {
  width:5px; height:5px; border-radius:50%;
  background:var(--ac); box-shadow:0 0 6px var(--ac);
  display:inline-block; margin-right:6px;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── MAIN ── */
main { max-width:900px; margin:0 auto; padding:32px 24px 80px; }

/* ── CONTROLS ── */
.controls {
  display:flex; align-items:center; gap:8px; margin-bottom:28px; flex-wrap:wrap;
}
.filter-label {
  font-family:var(--mono); font-size:10px; color:var(--tx4);
  text-transform:uppercase; letter-spacing:.08em; margin-right:4px;
}
.filter-btn {
  background:var(--bg1); border:1px solid var(--bd); color:var(--tx3);
  padding:5px 12px; font-family:var(--sans); font-size:11px; font-weight:500;
  cursor:pointer; border-radius:var(--rs); transition:all .12s;
}
.filter-btn:hover { background:var(--bgh); color:var(--tx); border-color:var(--bds); }
.filter-btn.active { background:var(--tx); color:var(--bg); border-color:var(--tx); font-weight:600; }

/* ── SESSION META ── */
.session-bar {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px; flex-wrap:wrap; gap:10px;
}
.session-info {
  font-family:var(--mono); font-size:11px; color:var(--tx3);
  display:flex; align-items:center; gap:14px;
}
.badge {
  background:var(--bg1); border:1px solid var(--bd);
  padding:3px 9px; border-radius:var(--rs); color:var(--tx2);
}
.badge.green { background:var(--acd); border-color:rgba(74,222,128,.25); color:var(--ac); }
.badge.red   { background:rgba(248,113,113,.08); border-color:rgba(248,113,113,.25); color:var(--er); }
.progress-bar {
  width:180px; height:2px; background:var(--bd); border-radius:2px; overflow:hidden;
}
.progress-fill {
  height:100%; background:var(--ac);
  transition:width .35s ease;
  box-shadow:0 0 4px var(--ac);
}
.btn {
  background:var(--bg1); border:1px solid var(--bd); color:var(--tx2);
  padding:7px 14px; font-family:var(--sans); font-size:12px; font-weight:500;
  cursor:pointer; border-radius:var(--rs); transition:all .12s;
  display:inline-flex; align-items:center; gap:7px;
}
.btn:hover { background:var(--bgh); border-color:var(--bds); color:var(--tx); }
.btn svg { width:13px; height:13px; flex-shrink:0; }
.btn.primary { background:var(--tx); border-color:var(--tx); color:var(--bg); }
.btn.primary:hover { background:#ccc; border-color:#ccc; }

/* ── CARD AREA ── */
.card-area { display:flex; flex-direction:column; align-items:center; }

/* Flashcard */
.flashcard {
  width:100%; max-width:760px;
  aspect-ratio:16/9;
  perspective:1400px;
  cursor:pointer; margin-bottom:18px;
}
.fc-inner {
  position:relative; width:100%; height:100%;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d;
}
.flashcard.flipped .fc-inner { transform:rotateY(180deg); }
.fc-face {
  position:absolute; inset:0;
  backface-visibility:hidden;
  border-radius:var(--r);
  border:1px solid var(--bd);
  padding:36px 48px;
  display:flex; flex-direction:column;
  overflow:hidden;
  transition:border-color .15s;
}
.flashcard:hover .fc-face { border-color:var(--bds); }
.fc-face.front { background:var(--bg1); }
.fc-face.back  { background:var(--bg2); transform:rotateY(180deg); }

/* front */
.fc-eyebrow {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px;
  font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em;
}
.fc-tag { color:var(--ac); display:flex; align-items:center; gap:6px; }
.fc-tag::before { content:''; width:4px; height:4px; background:var(--ac); border-radius:1px; }
.fc-side { color:var(--tx4); }
.fc-auteur {
  font-size:28px; font-weight:600; color:var(--tx);
  letter-spacing:-.02em; line-height:1.1; margin-bottom:6px;
}
.fc-oeuvre {
  font-size:14px; color:var(--ac); font-style:italic;
  line-height:1.3; margin-bottom:auto;
}
.fc-notions-row {
  display:flex; flex-wrap:wrap; gap:5px; margin-top:16px;
}
.notion-tag {
  font-family:var(--mono); font-size:9px; text-transform:uppercase;
  letter-spacing:.06em; color:var(--ac);
  background:var(--acd); border:1px solid rgba(74,222,128,.2);
  padding:2px 7px; border-radius:3px;
}
.fc-hint {
  position:absolute; bottom:16px; left:0; right:0;
  text-align:center;
  font-family:var(--mono); font-size:9px; color:var(--tx4);
  letter-spacing:.06em; text-transform:uppercase;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.kbd {
  background:var(--bg3); border:1px solid var(--bd);
  border-radius:3px; padding:1px 5px;
  font-family:var(--mono); font-size:9px; color:var(--tx3);
}

/* back */
.fc-back-auteur {
  font-family:var(--mono); font-size:10px; color:var(--tx4);
  margin-bottom:16px; text-transform:uppercase; letter-spacing:.05em;
}
.fc-resume-label {
  font-family:var(--mono); font-size:9px; color:var(--ac);
  text-transform:uppercase; letter-spacing:.1em;
  margin-bottom:10px; display:flex; align-items:center; gap:6px;
}
.fc-resume-label::before { content:''; width:4px; height:4px; background:var(--ac); border-radius:1px; }
.fc-resume {
  font-size:15px; color:var(--tx); line-height:1.65;
  flex:1;
}
.fc-resume strong { font-weight:500; color:var(--ac); }
.fc-resume em { color:var(--tx2); font-style:italic; }
.fc-notions-back {
  margin-top:14px; padding-top:12px; border-top:1px solid var(--bd);
  display:flex; flex-wrap:wrap; gap:4px;
}
.fc-back-eyebrow {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
  font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em;
}

/* ── ACTION BUTTONS ── */
.card-actions {
  display:flex; gap:8px; justify-content:center;
  margin-bottom:20px; width:100%; max-width:760px;
}
.action-btn {
  flex:1; max-width:160px;
  background:var(--bg1); border:1px solid var(--bd); color:var(--tx2);
  padding:10px 0; font-family:var(--sans); font-size:12px; font-weight:500;
  cursor:pointer; border-radius:var(--rs); transition:all .12s;
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.action-btn:hover { background:var(--bgh); border-color:var(--bds); color:var(--tx); }
.action-btn.ok  { border-color:#2d6e44; background:rgba(74,222,128,.07); color:var(--ac); }
.action-btn.ok:hover  { background:rgba(74,222,128,.14); }
.action-btn.nok { border-color:rgba(248,113,113,.4); background:rgba(248,113,113,.06); color:var(--er); }
.action-btn.nok:hover { background:rgba(248,113,113,.12); }
.action-btn svg { width:14px; height:14px; }

/* Nav buttons below */
.nav-row {
  display:flex; gap:8px; justify-content:space-between;
  width:100%; max-width:760px;
}

/* ── RESULTS SCREEN ── */
.results {
  display:none; flex-direction:column; align-items:center;
  gap:24px; text-align:center;
  background:var(--bg1); border:1px solid var(--bd);
  border-radius:var(--r); padding:48px 32px;
  max-width:760px; width:100%;
}
.results.show { display:flex; }
.results-score {
  font-family:var(--mono); font-size:72px; font-weight:500;
  color:var(--tx); letter-spacing:-.04em; line-height:1;
}
.results-score .den { color:var(--tx3); font-size:40px; }
.results-pct { font-family:var(--mono); font-size:12px; color:var(--ac); margin-top:4px; }
.results-msg { font-size:14px; color:var(--tx2); max-width:360px; line-height:1.55; }
.results-actions { display:flex; gap:8px; }
.results-label {
  font-family:var(--mono); font-size:10px; text-transform:uppercase;
  letter-spacing:.12em; color:var(--tx4);
}

/* ── FOOTER ── */
.footer {
  max-width:900px; margin:60px auto 0; padding:18px 24px;
  border-top:1px solid var(--bd);
  font-family:var(--mono); font-size:10px; color:var(--tx4);
  display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;
}
.legend { display:flex; align-items:center; gap:6px; }
.legend-dot { width:5px; height:5px; background:var(--ac); border-radius:50%; box-shadow:0 0 4px var(--ac); }

@media(max-width:640px){
  .topbar-right { display:none; }
  main { padding:20px 16px 60px; }
  .fc-face { padding:22px 20px; }
  .fc-auteur { font-size:22px; }
  .fc-resume { font-size:13px; }
  .progress-bar { display:none; }
  .results-score { font-size:52px; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">φ</div>
      <div class="brand-text">
        <span class="brand-name">flashcards · textes</span>
        <span class="brand-sub">terminale · bac 2026</span>
      </div>
    </div>
    <div class="topbar-right">
      <span><span class="dot-live"></span><span id="hd-count">23 textes</span></span>
      <span id="hd-session">session en cours</span>
    </div>
  </div>
</header>

<main>

  <!-- FILTRES PAR NOTION -->
  <div class="controls" id="controls">
    <span class="filter-label">notion</span>
    <!-- rendered by JS -->
  </div>

  <!-- BARRE SESSION -->
  <div class="session-bar">
    <div class="session-info">
      <span class="badge" id="card-counter">1 / 23</span>
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
      <span class="badge green" id="score-ok">✓ 0</span>
      <span class="badge red"   id="score-nok">✗ 0</span>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn" id="btn-shuffle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        Mélanger
      </button>
      <button class="btn" id="btn-restart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Réinitialiser
      </button>
    </div>
  </div>

  <!-- ZONE CARTE -->
  <div class="card-area" id="card-area">
    <div class="flashcard" id="flashcard">
      <div class="fc-inner" id="fc-inner">
        <!-- RECTO -->
        <div class="fc-face front" id="fc-front">
          <div class="fc-eyebrow">
            <span class="fc-tag" id="fc-tag">Auteur</span>
            <span class="fc-side">recto</span>
          </div>
          <div class="fc-auteur" id="fc-auteur"></div>
          <div class="fc-oeuvre" id="fc-oeuvre"></div>
          <div class="fc-notions-row" id="fc-notions-front"></div>
          <div class="fc-hint">
            <span class="kbd">espace</span> retourner
            <span class="kbd">←</span><span class="kbd">→</span> naviguer
          </div>
        </div>
        <!-- VERSO -->
        <div class="fc-face back" id="fc-back">
          <div class="fc-back-eyebrow">
            <span class="fc-tag">Résumé</span>
            <span class="fc-side" style="color:var(--tx4)">verso</span>
          </div>
          <div class="fc-back-auteur" id="fc-back-auteur"></div>
          <div class="fc-resume-label">Thèse principale</div>
          <div class="fc-resume" id="fc-resume"></div>
          <div class="fc-notions-back" id="fc-notions-back"></div>
          <div class="fc-hint" style="position:relative;bottom:auto;margin-top:10px">
            <span class="kbd">espace</span> retourner
          </div>
        </div>
      </div>
    </div>

    <!-- ACTIONS SU/SD (shown après retournement) -->
    <div class="card-actions" id="card-actions" style="display:none">
      <button class="action-btn nok" id="btn-nok">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        À revoir
      </button>
      <button class="action-btn" id="btn-skip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        Passer
      </button>
      <button class="action-btn ok" id="btn-ok">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Maîtrisé
      </button>
    </div>

    <!-- NAV -->
    <div class="nav-row" id="nav-row">
      <button class="btn" id="btn-prev">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Précédent
      </button>
      <button class="btn primary" id="btn-flip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        Retourner
      </button>
      <button class="btn" id="btn-next">
        Suivant
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <!-- RÉSULTATS -->
    <div class="results" id="results">
      <div class="results-label">Session terminée</div>
      <div>
        <div class="results-score"><span id="res-ok">0</span><span class="den"> / <span id="res-total">23</span></span></div>
        <div class="results-pct" id="res-pct">0%</div>
      </div>
      <div class="results-msg" id="res-msg"></div>
      <div class="results-actions">
        <button class="btn" id="res-review">Revoir les difficiles</button>
        <button class="btn primary" id="res-restart">↻ Recommencer</button>
      </div>
    </div>
  </div>
</main>

<footer class="footer">
  <span>23 textes · fiche méthodologique prof · bac 2026</span>
  <span class="legend"><span class="legend-dot"></span>notions mobilisables</span>
</footer>

<script>
// ── DATA : 23 textes du PDF, strictement ────────────────────────────────
const TEXTES = [
  {
    id: 1,
    auteur: "James",
    oeuvre: "Le pragmatisme",
    resume: `La vérité n'a pas de valeur en soi : elle vaut si elle <strong>rend l'action plus efficace</strong>. On ne recherche pas le vrai par amour du vrai, mais parce qu'il nous aide à agir. La raison elle-même n'est qu'une faculté pratique. Ce texte peut être mobilisé pour montrer que toute connaissance — scientifique, judiciaire, ou ordinaire — se juge à ses effets, non à sa conformité à un réel absolu.`,
    notions: ["La vérité","La justice","La science","Le langage","La raison","La liberté","Le temps"],
    mots_cles: ["vérité pragmatique","valeur d'usage","efficacité","action","raison pratique"],
  },
  {
    id: 2,
    auteur: "Kant",
    oeuvre: "D'un prétendu droit de mentir par humanité",
    resume: `Mentir est <strong>toujours interdit</strong>, sans exception. Kant avance deux arguments : (1) on ne peut pas prévoir les conséquences d'un mensonge ; (2) le mensonge détruit la <strong>confiance sociale</strong> sans laquelle aucun lien n'est possible. Même au meurtrier qui cherche notre ami, nous devons dire la vérité. Ce texte illustre l'<em>impératif catégorique</em> et peut être mobilisé sur le devoir, la liberté, l'État, le langage.`,
    notions: ["La vérité","Le devoir","La justice","L'État","Le langage","La conscience","La liberté","Le temps"],
    mots_cles: ["mensonge","impératif catégorique","confiance sociale","conséquences","devoir de vérité"],
  },
  {
    id: 3,
    auteur: "Platon",
    oeuvre: "La République — Allégorie de la caverne",
    resume: `Des prisonniers enchaînés dans une caverne prennent les <strong>ombres pour la réalité</strong>. L'un d'eux, libéré, monte vers la lumière (les Idées) et découvre la vérité. Lorsqu'il redescend pour libérer ses camarades, il risque d'être tué. Ce texte articule : vérité = intelligible vs illusion = sensible. Il mobilise le devoir (libérer les autres), la liberté (quitter les apparences), la science (première étape hors de la caverne), le bonheur (la vérité n'est pas sans danger).`,
    notions: ["La vérité","Le devoir","La nature","La science","Le bonheur","Le langage","La raison","La conscience","La liberté"],
    mots_cles: ["caverne","ombres","intelligible","sensible","Idées","illusion","libération","philosophe-roi"],
  },
  {
    id: 4,
    auteur: "Gorgias",
    oeuvre: "Sur le non-être",
    resume: `Trois thèses radicales : (1) rien n'existe ; (2) si quelque chose existe, on ne peut le connaître ; (3) si on peut le connaître, on ne peut le <strong>communiquer</strong>. Les mots sont trop généraux pour rendre nos ressentis singuliers — comment décrire le rouge à un aveugle ? Ce <em>relativisme absolu</em> remet en cause la science, la justice, le langage, et place l'individu face à la solitude irréductible de sa conscience.`,
    notions: ["La vérité","L'art","La justice","La science","L'État","Le langage","La raison","La conscience"],
    mots_cles: ["relativisme","incommunicabilité","perception","mots généraux","vérité subjective","non-être"],
  },
  {
    id: 5,
    auteur: "Nietzsche",
    oeuvre: "Par-delà bien et mal — Préface",
    resume: `La vérité est comme une femme : multiple, séduisante, insaisissable. Elle ne peut être possédée. Nietzsche propose le <strong>perspectivisme</strong> : toute connaissance dépend d'un point de vue, et les points de vue ne se valent pas (l'expert prime sur le néophyte). Chaque œuvre d'art offre un nouveau point de vue sur le réel. Ce texte est mobilisable sur la vérité, l'art, la science, et la liberté (la vérité libre ne peut être possédée).`,
    notions: ["La vérité","L'art","La science","La liberté"],
    mots_cles: ["perspectivisme","point de vue","pluralité","femme-vérité","expert vs opinion"],
  },
  {
    id: 6,

// ── TOUTES LES NOTIONS pour les filtres ────────────────────────────────
const ALL_NOTIONS = [...new Set(TEXTES.flatMap(t => t.notions))].sort();

// ── STATE ────────────────────────────────────────────────────────────────
let state = {
  filter: null,      // notion filtrée
  deck: [],          // indices dans TEXTES (après filtre + ordre)
  idx: 0,            // position courante dans deck
  flipped: false,
  scores: {},        // texte.id → 'ok' | 'nok' | null
  sessionDone: false,
};

// ── INIT ─────────────────────────────────────────────────────────────────
function buildDeck() {
  const filtered = state.filter
    ? TEXTES.filter(t => t.notions.includes(state.filter))
    : [...TEXTES];
  state.deck = filtered.map(t => t.id);
  state.idx = 0;
  state.flipped = false;
  state.sessionDone = false;
  filtered.forEach(t => { if (!(t.id in state.scores)) state.scores[t.id] = null; });
}

function currentTexte() {
  return TEXTES.find(t => t.id === state.deck[state.idx]);
}

// ── RENDER ──────────────────────────────────────────────────────────────
function renderCard() {
  const t = currentTexte();
  if (!t) return;

  // Recto
  document.getElementById('fc-tag').textContent = `${state.idx + 1} / ${state.deck.length}`;
  document.getElementById('fc-auteur').textContent = t.auteur;
  document.getElementById('fc-oeuvre').textContent = t.oeuvre;

  const nf = document.getElementById('fc-notions-front');
  nf.innerHTML = '';
  t.notions.forEach(n => {
    const sp = document.createElement('span');
    sp.className = 'notion-tag';
    sp.textContent = n;
    nf.appendChild(sp);
  });

  // Verso
  document.getElementById('fc-back-auteur').textContent = `${t.auteur} — ${t.oeuvre}`;
  document.getElementById('fc-resume').innerHTML = t.resume;

  const nb = document.getElementById('fc-notions-back');
  nb.innerHTML = '';
  t.notions.forEach(n => {
    const sp = document.createElement('span');
    sp.className = 'notion-tag';
    sp.textContent = n;
    nb.appendChild(sp);
  });

  // Flip state
  const fc = document.getElementById('flashcard');
  fc.classList.toggle('flipped', state.flipped);

  // Actions visibility
  document.getElementById('card-actions').style.display = state.flipped ? 'flex' : 'none';

  // Nav buttons
  document.getElementById('btn-prev').disabled = state.idx === 0;
  document.getElementById('btn-next').disabled = state.idx === state.deck.length - 1;

  // Progress
  updateMeta();
}

function updateMeta() {
  const total = state.deck.length;
  const pos   = state.idx + 1;
  const ok    = state.deck.filter(id => state.scores[id] === 'ok').length;
  const nok   = state.deck.filter(id => state.scores[id] === 'nok').length;

  document.getElementById('card-counter').textContent = `${pos} / ${total}`;
  document.getElementById('prog').style.width = `${(pos / total) * 100}%`;
  document.getElementById('score-ok').textContent  = `✓ ${ok}`;
  document.getElementById('score-nok').textContent = `✗ ${nok}`;
  document.getElementById('hd-count').textContent  = `${total} texte${total > 1 ? 's' : ''}`;
}

function showResults() {
  state.sessionDone = true;
  document.getElementById('flashcard').style.display   = 'none';
  document.getElementById('card-actions').style.display = 'none';
  document.getElementById('nav-row').style.display      = 'none';

  const total = state.deck.length;
  const ok    = state.deck.filter(id => state.scores[id] === 'ok').length;
  const pct   = Math.round((ok / total) * 100);

  const msgs = [
    [100, "Parfait. Tous les textes maîtrisés."],
    [80,  "Excellent. Quelques textes à revoir."],
    [60,  "Bon niveau. Continue sur ta lancée."],
    [40,  "Les bases sont là. Revois les difficiles."],
    [0,   "Continue. Relis tes fiches et recommence."],
  ];
  const msg = msgs.find(([t]) => pct >= t)[1];

  document.getElementById('res-ok').textContent    = ok;
  document.getElementById('res-total').textContent = total;
  document.getElementById('res-pct').textContent   = `${pct}%`;
  document.getElementById('res-msg').textContent   = msg;
  document.getElementById('results').classList.add('show');
}

// ── FILTRES ─────────────────────────────────────────────────────────────
function buildFilters() {
  const bar = document.getElementById('controls');
  // "Tous"
  const all = document.createElement('button');
  all.className = 'filter-btn' + (state.filter === null ? ' active' : '');
  all.textContent = 'Tous';
  all.onclick = () => { state.filter = null; applyFilter(); };
  bar.appendChild(all);

  ALL_NOTIONS.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (state.filter === n ? ' active' : '');
    btn.textContent = n;
    btn.onclick = () => { state.filter = n; applyFilter(); };
    bar.appendChild(btn);
  });
}

function applyFilter() {
  // Reset
  document.getElementById('controls').innerHTML = '';
  buildFilters();
  state.scores = {};
  buildDeck();
  resetUI();
  renderCard();
}

function resetUI() {
  state.flipped = false;
  document.getElementById('flashcard').style.display   = '';
  document.getElementById('card-actions').style.display = 'none';
  document.getElementById('nav-row').style.display      = '';
  document.getElementById('results').classList.remove('show');
}

// ── SHUFFLE ─────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── NAVIGATION ──────────────────────────────────────────────────────────
function flip() {
  state.flipped = !state.flipped;
  document.getElementById('flashcard').classList.toggle('flipped', state.flipped);
  document.getElementById('card-actions').style.display = state.flipped ? 'flex' : 'none';
}

function goTo(idx) {
  state.idx     = idx;
  state.flipped = false;
  renderCard();
}

function markAndNext(mark) {
  const t = currentTexte();
  if (t) state.scores[t.id] = mark;
  if (state.idx < state.deck.length - 1) {
    goTo(state.idx + 1);
  } else {
    showResults();
  }
}

// ── EVENTS ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildDeck();
  buildFilters();
  renderCard();

  document.getElementById('flashcard').addEventListener('click', flip);
  document.getElementById('btn-flip').addEventListener('click', (e) => { e.stopPropagation(); flip(); });
  document.getElementById('btn-prev').addEventListener('click', (e) => { e.stopPropagation(); if (state.idx > 0) goTo(state.idx - 1); });
  document.getElementById('btn-next').addEventListener('click', (e) => { e.stopPropagation(); if (state.idx < state.deck.length - 1) goTo(state.idx + 1); });

  document.getElementById('btn-ok').addEventListener('click',   (e) => { e.stopPropagation(); markAndNext('ok'); });
  document.getElementById('btn-nok').addEventListener('click',  (e) => { e.stopPropagation(); markAndNext('nok'); });
  document.getElementById('btn-skip').addEventListener('click', (e) => { e.stopPropagation(); markAndNext(null); });

  document.getElementById('btn-shuffle').addEventListener('click', () => {
    state.deck = shuffle(state.deck);
    state.idx  = 0;
    state.scores = {};
    buildDeck();
    state.deck = shuffle(state.deck);
    resetUI();
    renderCard();
  });

  document.getElementById('btn-restart').addEventListener('click', () => {
    state.scores = {};
    buildDeck();
    resetUI();
    renderCard();
  });

  document.getElementById('res-restart').addEventListener('click', () => {
    state.scores = {};
    buildDeck();
    resetUI();
    renderCard();
  });

  document.getElementById('res-review').addEventListener('click', () => {
    const difficult = state.deck.filter(id => state.scores[id] === 'nok' || state.scores[id] === null);
    if (!difficult.length) return;
    state.deck   = difficult;
    state.idx    = 0;
    state.scores = {};
    resetUI();
    renderCard();
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (state.sessionDone) return;
    if (['INPUT','TEXTAREA','BUTTON'].includes(e.target.tagName)) return;
    switch (e.key) {
      case ' ':
      case 'Enter':
        e.preventDefault();
        flip();
        break;
      case 'ArrowLeft':
        if (state.idx > 0) goTo(state.idx - 1);
        break;
      case 'ArrowRight':
        if (!state.flipped) { flip(); }
        else { markAndNext(null); }
        break;
      case '1':
        if (state.flipped) markAndNext('nok');
        break;
      case '3':
        if (state.flipped) markAndNext('ok');
        break;
    }
  });
});
</script>

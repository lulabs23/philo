<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>φ révisions · philosophie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0b; --bg1:#111113; --bg2:#161618; --bg3:#1c1c1f; --bgh:#202024;
  --bd:#26262a; --bds:#34343a;
  --tx:#ededed; --tx2:#a1a1a8; --tx3:#6c6c75; --tx4:#4a4a52;
  --ac:#4ade80; --acd:rgba(74,222,128,.1); --acs:rgba(74,222,128,.2);
  --er:#f87171; --erd:rgba(248,113,113,.08); --ers:rgba(248,113,113,.25);
  --sans:'Geist',-apple-system,sans-serif;
  --mono:'Geist Mono',monospace;
  --r:7px; --rs:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;letter-spacing:-.005em}
body{background-image:radial-gradient(ellipse 70% 40% at 50% -10%,rgba(74,222,128,.05),transparent),radial-gradient(ellipse 50% 30% at 90% 5%,rgba(74,222,128,.02),transparent)}
::selection{background:var(--acd);color:var(--tx)}

/* ── TOPBAR ── */
.topbar{border-bottom:1px solid var(--bd);background:rgba(10,10,11,.9);backdrop-filter:blur(14px);position:sticky;top:0;z-index:200}
.topbar-inner{max-width:1100px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.brand-mark{width:24px;height:24px;border-radius:5px;background:linear-gradient(135deg,var(--ac),#2d6e44);display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:600;color:#0a0a0b;flex-shrink:0}
.brand-text{display:flex;flex-direction:column;gap:1px}
.brand-name{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--tx)}
.brand-sub{font-family:var(--mono);font-size:10px;color:var(--tx3)}
.mode-toggle{display:flex;gap:2px;background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:3px}
.mode-btn{background:transparent;border:none;padding:7px 16px;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;color:var(--tx3);border-radius:var(--rs);transition:all .12s;display:flex;align-items:center;gap:7px}
.mode-btn svg{width:13px;height:13px}
.mode-btn:hover{color:var(--tx2)}
.mode-btn.active{background:var(--bg3);color:var(--tx);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.topbar-meta{font-family:var(--mono);font-size:11px;color:var(--tx4);display:flex;align-items:center;gap:4px}
.dot-live{width:5px;height:5px;border-radius:50%;background:var(--ac);box-shadow:0 0 6px var(--ac);display:inline-block;margin-right:5px;animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYOUT ── */
main{max-width:1100px;margin:0 auto;padding:28px 24px 80px}
.section{display:none;animation:fadeUp .22s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── SHARED CONTROLS ── */
.controls-row{display:flex;align-items:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.filter-label{font-family:var(--mono);font-size:10px;color:var(--tx4);text-transform:uppercase;letter-spacing:.08em;margin-right:2px}
.chip{padding:5px 12px;background:var(--bg1);border:1px solid var(--bd);color:var(--tx3);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;border-radius:var(--rs);transition:all .12s}
.chip:hover{background:var(--bgh);color:var(--tx);border-color:var(--bds)}
.chip.active{background:var(--tx);color:var(--bg);border-color:var(--tx);font-weight:600}
.chip[data-cours]::before{content:'';width:5px;height:5px;background:var(--ac);border-radius:50%;box-shadow:0 0 4px var(--ac);display:inline-block;margin-right:6px;vertical-align:middle}
.chip.active[data-cours]::before{background:var(--bg);box-shadow:none}

.btn{background:var(--bg1);border:1px solid var(--bd);color:var(--tx2);padding:7px 14px;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;border-radius:var(--rs);transition:all .12s;display:inline-flex;align-items:center;gap:7px}
.btn:hover:not(:disabled){background:var(--bgh);border-color:var(--bds);color:var(--tx)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.primary{background:var(--tx);border-color:var(--tx);color:var(--bg)}
.btn.primary:hover:not(:disabled){background:#ccc;border-color:#ccc}
.btn svg{width:13px;height:13px;flex-shrink:0}

/* ═══════════════════════════════════════
   MODE A — FLASHCARDS PAR TEXTE
═══════════════════════════════════════ */
.fc-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.fc-meta{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;color:var(--tx3)}
.badge{background:var(--bg1);border:1px solid var(--bd);padding:3px 9px;border-radius:var(--rs);color:var(--tx2)}
.badge.ok{background:var(--acd);border-color:var(--acs);color:var(--ac)}
.badge.nok{background:var(--erd);border-color:var(--ers);color:var(--er)}
.prog-bar{width:160px;height:2px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--ac);transition:width .35s;box-shadow:0 0 4px var(--ac)}
.fc-actions-row{display:flex;gap:6px}

/* Card flip */
.flashcard{width:100%;aspect-ratio:16/9;perspective:1400px;cursor:pointer;margin-bottom:14px}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);border:1px solid var(--bd);padding:36px 48px;display:flex;flex-direction:column;overflow:hidden;transition:border-color .15s}
.flashcard:hover .fc-face{border-color:var(--bds)}
.fc-face.front{background:var(--bg1)}
.fc-face.back{background:var(--bg2);transform:rotateY(180deg)}

.fc-eyebrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em}
.fc-tag{color:var(--ac);display:flex;align-items:center;gap:5px}
.fc-tag::before{content:'';width:4px;height:4px;background:var(--ac);border-radius:1px}
.fc-side{color:var(--tx4)}
.fc-auteur{font-size:26px;font-weight:600;color:var(--tx);letter-spacing:-.02em;line-height:1.1;margin-bottom:5px}
.fc-oeuvre{font-size:14px;color:var(--ac);font-style:italic;line-height:1.3;margin-bottom:auto}
.notion-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:14px}
.ntag{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--ac);background:var(--acd);border:1px solid var(--acs);padding:2px 7px;border-radius:3px}
.ntag.dim{color:var(--tx4);background:transparent;border-color:var(--bd)}
.fc-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:9px;color:var(--tx4);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:7px}
.kbd{background:var(--bg3);border:1px solid var(--bd);border-radius:3px;padding:1px 5px;font-family:var(--mono);font-size:9px;color:var(--tx3)}

.fc-back-sub{font-family:var(--mono);font-size:10px;color:var(--tx4);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
.fc-resume-label{font-family:var(--mono);font-size:9px;color:var(--ac);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.fc-resume-label::before{content:'';width:4px;height:4px;background:var(--ac);border-radius:1px}
.fc-resume{font-size:14.5px;color:var(--tx);line-height:1.65;flex:1;overflow:hidden}
.fc-resume strong{font-weight:500;color:var(--ac)}
.fc-resume em{color:var(--tx2);font-style:italic}
.fc-notions-back{margin-top:12px;padding-top:10px;border-top:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:4px}

/* Mark buttons */
.mark-row{display:flex;gap:7px;justify-content:center;margin-bottom:14px}
.mark-btn{flex:1;max-width:150px;padding:9px 0;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;border-radius:var(--rs);transition:all .12s;display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--bd);background:var(--bg1);color:var(--tx2)}
.mark-btn:hover{background:var(--bgh);border-color:var(--bds);color:var(--tx)}
.mark-btn.ok{border-color:#2d6e44;background:rgba(74,222,128,.07);color:var(--ac)}
.mark-btn.ok:hover{background:rgba(74,222,128,.14)}
.mark-btn.nok{border-color:rgba(248,113,113,.4);background:var(--erd);color:var(--er)}
.mark-btn.nok:hover{background:rgba(248,113,113,.13)}
.mark-btn svg{width:14px;height:14px}

.nav-row{display:flex;gap:7px;justify-content:space-between}

/* Result screen */
.result-screen{display:none;flex-direction:column;align-items:center;gap:20px;text-align:center;background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:48px 32px}
.result-screen.show{display:flex;animation:fadeUp .25s ease}
.res-score{font-family:var(--mono);font-size:72px;font-weight:500;color:var(--tx);letter-spacing:-.04em;line-height:1}
.res-score .den{color:var(--tx3);font-size:40px}
.res-pct{font-family:var(--mono);font-size:12px;color:var(--ac);margin-top:4px}
.res-msg{font-size:14px;color:var(--tx2);max-width:340px;line-height:1.55}
.res-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--tx4)}
.res-actions{display:flex;gap:8px}

/* ═══════════════════════════════════════
   MODE B — FICHES PAR NOTION
═══════════════════════════════════════ */
.notion-layout{display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:start}
.notion-sidebar{}
.notion-nav{display:flex;flex-direction:column;gap:3px;position:sticky;top:72px}
.notion-nav-btn{background:transparent;border:none;padding:8px 12px;font-family:var(--sans);font-size:12px;color:var(--tx3);cursor:pointer;border-radius:var(--rs);text-align:left;transition:all .12s;display:flex;align-items:center;gap:8px;width:100%}
.notion-nav-btn:hover{background:var(--bg1);color:var(--tx)}
.notion-nav-btn.active{background:var(--bg2);color:var(--tx);font-weight:500}
.notion-nav-btn .ndot{width:5px;height:5px;border-radius:50%;background:var(--tx4);flex-shrink:0}
.notion-nav-btn.active .ndot{background:var(--ac);box-shadow:0 0 4px var(--ac)}
.notion-nav-btn[data-cours] .ndot{background:var(--ac);opacity:.6}
.notion-nav-btn.active[data-cours] .ndot{opacity:1;box-shadow:0 0 4px var(--ac)}

.notion-content{}
.notion-header{margin-bottom:24px}
.notion-eyebrow{font-family:var(--mono);font-size:10px;color:var(--tx4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.notion-cours-badge{font-family:var(--mono);font-size:9px;color:var(--ac);background:var(--acd);border:1px solid var(--acs);padding:2px 7px;border-radius:3px;letter-spacing:.06em}
.notion-title{font-size:32px;font-weight:600;color:var(--tx);letter-spacing:-.02em;line-height:1.1;margin-bottom:8px}
.notion-intro{font-size:14px;color:var(--tx3);line-height:1.55;font-style:italic;max-width:680px}
.section-sep{height:1px;background:var(--bd);margin:22px 0}

/* Auteurs table */
.auteurs-label{font-family:var(--mono);font-size:10px;color:var(--tx4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.auteurs-table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;background:var(--bg1)}
.auteurs-table thead{background:var(--bg2)}
.auteurs-table th{text-align:left;padding:9px 14px;font-family:var(--mono);font-size:9px;font-weight:500;color:var(--tx4);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bd)}
.auteurs-table td{padding:11px 14px;border-bottom:1px solid var(--bd);vertical-align:top;font-size:13px;color:var(--tx2);line-height:1.5}
.auteurs-table tbody tr:last-child td{border-bottom:none}
.auteurs-table tbody tr{transition:background .1s}
.auteurs-table tbody tr:hover td{background:var(--bg2);color:var(--tx)}
.td-name{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap}
.td-dates{font-family:var(--mono);font-size:10px;color:var(--tx4);display:block;margin-top:2px}
.td-concept{font-family:var(--mono);font-size:10px;color:var(--ac);background:var(--acd);border:1px solid var(--acs);padding:2px 7px;border-radius:3px;display:inline-block;white-space:nowrap}
.td-these{font-size:12.5px;color:var(--tx2);line-height:1.5}

/* Méthodo section */
.methodo-label{font-family:var(--mono);font-size:10px;color:var(--tx4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;margin-top:22px}
.methodo-grid{display:flex;flex-direction:column;gap:6px}
.methodo-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:0;overflow:hidden;transition:border-color .12s}
.methodo-card:hover{border-color:var(--bds)}
.methodo-head{padding:12px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.methodo-auteur{font-size:13px;font-weight:500;color:var(--tx)}
.methodo-oeuvre{font-size:11px;color:var(--tx3);font-style:italic;margin-top:1px}
.methodo-usage{padding:0 16px 13px;font-size:12.5px;color:var(--tx2);line-height:1.55;border-top:1px solid var(--bd);padding-top:10px;margin-top:0}

/* Mobile */
@media(max-width:720px){
  .notion-layout{grid-template-columns:1fr}
  .notion-sidebar{display:none}
  .topbar-meta{display:none}
  main{padding:20px 16px 60px}
  .fc-face{padding:22px 20px}
  .fc-auteur{font-size:20px}
  .fc-resume{font-size:13px}
  .prog-bar{display:none}
  .res-score{font-size:52px}
  .notion-title{font-size:26px}
}
@media(max-width:480px){
  .flashcard{aspect-ratio:4/3}
  .nav-row{flex-wrap:wrap}
  .btn{flex:1;justify-content:center}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">φ</div>
      <div class="brand-text">
        <span class="brand-name">philosophie</span>
        <span class="brand-sub">terminale · bac 2026</span>
      </div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-mode-fc" onclick="switchMode('fc')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Flashcards
      </button>
      <button class="mode-btn" id="btn-mode-notions" onclick="switchMode('notions')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        Fiches notions
      </button>
    </div>
    <div class="topbar-meta"><span class="dot-live"></span>23 textes · 18 notions</div>
  </div>
</header>

<main>

<!-- ══════════════════ MODE FLASHCARDS ══════════════════ -->
<div class="section active" id="section-fc">
  <div class="controls-row" id="fc-filters"></div>

  <div class="fc-topbar">
    <div class="fc-meta">
      <span class="badge" id="fc-pos">1 / 23</span>
      <div class="prog-bar"><div class="prog-fill" id="fc-prog"></div></div>
      <span class="badge ok" id="fc-ok">✓ 0</span>
      <span class="badge nok" id="fc-nok">✗ 0</span>
    </div>
    <div class="fc-actions-row">
      <button class="btn" id="fc-shuffle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        Mélanger
      </button>
      <button class="btn" id="fc-reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Réinitialiser
      </button>
    </div>
  </div>

  <div id="fc-area">
    <div class="flashcard" id="flashcard">
      <div class="fc-inner">
        <div class="fc-face front">
          <div class="fc-eyebrow">
            <span class="fc-tag" id="fc-tag">Texte</span>
            <span class="fc-side">recto</span>
          </div>
          <div class="fc-auteur" id="fc-auteur"></div>
          <div class="fc-oeuvre" id="fc-oeuvre"></div>
          <div class="notion-tags" id="fc-ntags-front"></div>
          <div class="fc-hint"><span class="kbd">espace</span> retourner <span class="kbd">←</span><span class="kbd">→</span></div>
        </div>
        <div class="fc-face back">
          <div class="fc-eyebrow">
            <span class="fc-tag">Résumé</span>
            <span class="fc-side">verso</span>
          </div>
          <div class="fc-back-sub" id="fc-back-sub"></div>
          <div class="fc-resume-label">Thèse principale</div>
          <div class="fc-resume" id="fc-resume"></div>
          <div class="fc-notions-back" id="fc-ntags-back"></div>
          <div class="fc-hint" style="position:relative;bottom:auto;margin-top:10px"><span class="kbd">espace</span> retourner</div>
        </div>
      </div>
    </div>

    <div class="mark-row" id="mark-row" style="display:none">
      <button class="mark-btn nok" id="btn-nok">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        À revoir
      </button>
      <button class="mark-btn" id="btn-skip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        Passer
      </button>
      <button class="mark-btn ok" id="btn-ok">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Maîtrisé
      </button>
    </div>

    <div class="nav-row" id="nav-row">
      <button class="btn" id="fc-prev">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Précédent
      </button>
      <button class="btn primary" id="fc-flip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        Retourner
      </button>
      <button class="btn" id="fc-next">
        Suivant
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div class="result-screen" id="result-screen">
      <div class="res-label">Session terminée</div>
      <div><div class="res-score"><span id="res-ok">0</span><span class="den"> / <span id="res-total">23</span></span></div><div class="res-pct" id="res-pct">0%</div></div>
      <div class="res-msg" id="res-msg"></div>
      <div class="res-actions">
        <button class="btn" id="res-review">Revoir les difficiles</button>
        <button class="btn primary" id="res-restart">↻ Recommencer</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════ MODE FICHES NOTIONS ══════════════════ -->
<div class="section" id="section-notions">
  <div class="notion-layout">
    <div class="notion-sidebar">
      <nav class="notion-nav" id="notion-nav"></nav>
    </div>
    <div class="notion-content" id="notion-content"></div>
  </div>
</div>

const ALL_NOTIONS_FC = [...new Set(TEXTES.flatMap(t => t.notions))].sort();

// ══════════════════════════════════════════════════════════
// MODE SWITCH
// ══════════════════════════════════════════════════════════
function switchMode(mode) {
  document.getElementById('section-fc').classList.toggle('active', mode === 'fc');
  document.getElementById('section-notions').classList.toggle('active', mode === 'notions');
  document.getElementById('btn-mode-fc').classList.toggle('active', mode === 'fc');
  document.getElementById('btn-mode-notions').classList.toggle('active', mode === 'notions');
  if (mode === 'notions' && !notionsBuilt) buildNotionsMode();
}

// ══════════════════════════════════════════════════════════
// FLASHCARD STATE
// ══════════════════════════════════════════════════════════
let fcState = {
  filter: null,
  deck: [],
  idx: 0,
  flipped: false,
  scores: {},
  done: false,
};

function fcBuildDeck() {
  const src = fcState.filter ? TEXTES.filter(t => t.notions.includes(fcState.filter)) : [...TEXTES];
  fcState.deck = src.map(t => t.id);
  fcState.idx = 0; fcState.flipped = false; fcState.done = false;
  src.forEach(t => { if (!(t.id in fcState.scores)) fcState.scores[t.id] = null; });
}

function fcCurrent() { return TEXTES.find(t => t.id === fcState.deck[fcState.idx]); }

function fcShuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function fcRender() {
  const t = fcCurrent(); if (!t) return;
  const pos = fcState.idx + 1, total = fcState.deck.length;
  document.getElementById('fc-pos').textContent = `${pos} / ${total}`;
  document.getElementById('fc-prog').style.width = `${(pos/total)*100}%`;
  const ok  = fcState.deck.filter(id => fcState.scores[id]==='ok').length;
  const nok = fcState.deck.filter(id => fcState.scores[id]==='nok').length;
  document.getElementById('fc-ok').textContent  = `✓ ${ok}`;
  document.getElementById('fc-nok').textContent = `✗ ${nok}`;

  document.getElementById('fc-tag').textContent      = `${pos} / ${total}`;
  document.getElementById('fc-auteur').textContent   = t.auteur;
  document.getElementById('fc-oeuvre').textContent   = t.oeuvre;
  document.getElementById('fc-back-sub').textContent = `${t.auteur} — ${t.oeuvre}`;
  document.getElementById('fc-resume').innerHTML     = t.resume;

  const mktags = (el, tags, dim) => {
    el.innerHTML='';
    tags.forEach(n => {
      const s = document.createElement('span');
      s.className = 'ntag' + (dim?' dim':'');
      s.textContent = n; el.appendChild(s);
    });
  };
  mktags(document.getElementById('fc-ntags-front'), t.notions, false);
  mktags(document.getElementById('fc-ntags-back'),  t.notions, true);

  const fc = document.getElementById('flashcard');
  fc.classList.toggle('flipped', fcState.flipped);
  document.getElementById('mark-row').style.display  = fcState.flipped ? 'flex' : 'none';
  document.getElementById('fc-prev').disabled = fcState.idx === 0;
  document.getElementById('fc-next').disabled = fcState.idx === fcState.deck.length-1;
}

function fcFlip() {
  fcState.flipped = !fcState.flipped;
  document.getElementById('flashcard').classList.toggle('flipped', fcState.flipped);
  document.getElementById('mark-row').style.display = fcState.flipped ? 'flex' : 'none';
}

function fcGoTo(i) { fcState.idx = i; fcState.flipped = false; fcRender(); }

function fcMark(m) {
  const t = fcCurrent(); if (t) fcState.scores[t.id] = m;
  if (fcState.idx < fcState.deck.length-1) { fcGoTo(fcState.idx+1); }
  else { fcShowResults(); }
}

function fcShowResults() {
  fcState.done = true;
  document.getElementById('flashcard').style.display    = 'none';
  document.getElementById('mark-row').style.display     = 'none';
  document.getElementById('nav-row').style.display      = 'none';
  const total = fcState.deck.length;
  const ok    = fcState.deck.filter(id => fcState.scores[id]==='ok').length;
  const pct   = Math.round((ok/total)*100);
  const msgs  = [[100,"Parfait. Tous les textes maîtrisés."],[80,"Excellent. Quelques textes à revoir."],[60,"Bon niveau. Continue."],[40,"Les bases sont là. Revois les difficiles."],[0,"Continue — relis tes fiches et recommence."]];
  const msg   = msgs.find(([t])=>pct>=t)[1];
  document.getElementById('res-ok').textContent    = ok;
  document.getElementById('res-total').textContent = total;
  document.getElementById('res-pct').textContent   = `${pct}%`;
  document.getElementById('res-msg').textContent   = msg;
  document.getElementById('result-screen').classList.add('show');
}

function fcResetUI() {
  fcState.flipped = false;
  document.getElementById('flashcard').style.display    = '';
  document.getElementById('mark-row').style.display     = 'none';
  document.getElementById('nav-row').style.display      = '';
  document.getElementById('result-screen').classList.remove('show');
}

// Build filter chips
function fcBuildFilters() {
  const bar = document.getElementById('fc-filters');
  bar.innerHTML = '';
  const addChip = (label, val) => {
    const b = document.createElement('button');
    b.className = 'chip' + (fcState.filter===val?' active':'');
    b.textContent = label;
    b.onclick = () => { fcState.filter=val; fcState.scores={}; fcBuildDeck(); fcBuildFilters(); fcResetUI(); fcRender(); };
    bar.appendChild(b);
  };
  const lbl = document.createElement('span');
  lbl.className='filter-label'; lbl.textContent='filtre';
  bar.appendChild(lbl);
  addChip('Tous', null);
  ALL_NOTIONS_FC.forEach(n => addChip(n, n));
}

// ══════════════════════════════════════════════════════════
// FICHES NOTIONS
// ══════════════════════════════════════════════════════════
let notionsBuilt = false;
let currentNotion = 0;

function buildNotionsMode() {
  notionsBuilt = true;

  // Build sidebar nav
  const nav = document.getElementById('notion-nav');
  NOTIONS_DATA.forEach((n, i) => {
    const b = document.createElement('button');
    b.className = 'notion-nav-btn' + (i===0?' active':'');
    if (n.cours) b.dataset.cours = '1';
    b.innerHTML = `<span class="ndot"></span>${n.nom}`;
    b.onclick = () => showNotion(i);
    nav.appendChild(b);
  });

  showNotion(0);
}

function showNotion(idx) {
  currentNotion = idx;
  const n = NOTIONS_DATA[idx];

  // Update nav
  document.querySelectorAll('.notion-nav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));

  const content = document.getElementById('notion-content');

  // Build auteurs table rows
  const auteurRows = n.auteurs.map(a => `
    <tr>
      <td><div class="td-name">${a.nom}<span class="td-dates">${a.dates}</span></div></td>
      <td><span class="td-concept">${a.concept}</span></td>
      <td><div class="td-these">${a.these}</div></td>
    </tr>`).join('');

  // Build methodo cards
  const methodoCards = n.methodo.map(m => `
    <div class="methodo-card">
      <div class="methodo-head">
        <div>
          <div class="methodo-auteur">${m.auteur}</div>
          <div class="methodo-oeuvre">${m.oeuvre}</div>
        </div>
      </div>
      <div class="methodo-usage">${m.usage}</div>
    </div>`).join('');

  content.innerHTML = `
    <div class="notion-header">
      <div class="notion-eyebrow">
        <span>notion ${String(idx+1).padStart(2,'0')} / ${NOTIONS_DATA.length}</span>
        ${n.cours ? '<span class="notion-cours-badge">● en cours</span>' : ''}
      </div>
      <div class="notion-title">${n.nom}</div>
      <div class="notion-intro">${n.intro}</div>
    </div>

    <div class="section-sep"></div>

    <div class="auteurs-label">Auteurs · thèses</div>
    <table class="auteurs-table">
      <thead><tr>
        <th style="width:22%">Philosophe</th>
        <th style="width:22%">Concept-clé</th>
        <th style="width:56%">Thèse principale</th>
      </tr></thead>
      <tbody>${auteurRows}</tbody>
    </table>

    <div class="methodo-label">Connexions inter-notions · Fiche TG</div>
    <div class="methodo-grid">${methodoCards}</div>
  `;
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  fcBuildDeck();
  fcBuildFilters();
  fcRender();

  // Flashcard events
  document.getElementById('flashcard').addEventListener('click', fcFlip);
  document.getElementById('fc-flip').addEventListener('click', e=>{e.stopPropagation();fcFlip();});
  document.getElementById('fc-prev').addEventListener('click', e=>{e.stopPropagation();if(fcState.idx>0)fcGoTo(fcState.idx-1);});
  document.getElementById('fc-next').addEventListener('click', e=>{e.stopPropagation();if(fcState.idx<fcState.deck.length-1)fcGoTo(fcState.idx+1);});
  document.getElementById('btn-ok').addEventListener('click',  e=>{e.stopPropagation();fcMark('ok');});
  document.getElementById('btn-nok').addEventListener('click', e=>{e.stopPropagation();fcMark('nok');});
  document.getElementById('btn-skip').addEventListener('click',e=>{e.stopPropagation();fcMark(null);});
  document.getElementById('fc-shuffle').addEventListener('click',()=>{fcState.deck=fcShuffle(fcState.deck);fcState.idx=0;fcState.scores={};fcResetUI();fcRender();});
  document.getElementById('fc-reset').addEventListener('click',()=>{fcState.scores={};fcBuildDeck();fcResetUI();fcRender();});
  document.getElementById('res-restart').addEventListener('click',()=>{fcState.scores={};fcBuildDeck();fcResetUI();fcRender();});
  document.getElementById('res-review').addEventListener('click',()=>{
    const hard=fcState.deck.filter(id=>fcState.scores[id]==='nok'||fcState.scores[id]===null);
    if(!hard.length)return;
    fcState.deck=hard;fcState.idx=0;fcState.scores={};fcResetUI();fcRender();
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    const mode = document.getElementById('section-fc').classList.contains('active') ? 'fc' : 'notions';
    if (mode === 'notions') {
      if (e.key==='ArrowDown' && currentNotion<NOTIONS_DATA.length-1) showNotion(currentNotion+1);
      if (e.key==='ArrowUp'   && currentNotion>0)                     showNotion(currentNotion-1);
      return;
    }
    if (fcState.done) return;
    if (['INPUT','TEXTAREA','BUTTON'].includes(e.target.tagName)) return;
    if (e.key===' '||e.key==='Enter'){e.preventDefault();fcFlip();}
    else if (e.key==='ArrowLeft'  && fcState.idx>0) fcGoTo(fcState.idx-1);
    else if (e.key==='ArrowRight'){if(!fcState.flipped)fcFlip();else fcMark(null);}
    else if (e.key==='1'&&fcState.flipped) fcMark('nok');
    else if (e.key==='3'&&fcState.flipped) fcMark('ok');
  });
});
</script>
